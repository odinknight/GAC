<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>干支天文钟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Playfair+Display:wght@700&amp;display=swap');
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .title-font { font-family: 'Playfair Display', Georgia, serif; }
        .cosmic-bg { background: radial-gradient(circle at center, #f0f4ff 0%, #e0e7ff 100%); }
        canvas { border-radius: 9999px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25), inset 0 0 60px rgba(255,255,255,0.8); background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 cosmic-bg">
    <div class="max-w-[1280px] mx-auto px-6 py-6">
        <div class="flex flex-col lg:flex-row items-start lg:items-center justify-between mb-6 gap-4">
            <div>
                <h1 class="text-4xl lg:text-5xl font-bold title-font tracking-tighter text-slate-900">干支天文钟</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="px-4 py-2 bg-white/80 border border-slate-300 rounded-2xl flex items-center gap-2 text-sm shadow-sm">
                    <i class="fa-solid fa-globe text-emerald-500"></i>
                    <span class="text-slate-700">中国标准时间 • 北回归线向北观测</span>
                </div>
                <div class="px-4 py-2 bg-white/80 border border-slate-300 rounded-2xl font-mono text-sm shadow-sm" id="current-time">--:--:--</div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-7">
                <div class="bg-white/90 border border-slate-200 rounded-3xl p-6 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h2 class="text-2xl font-semibold text-slate-900">实时天干地支时钟</h2>
                            <p class="text-sm text-slate-500">五行配色 • 年柱中央 • 月份干支短针 • 精确日刻度</p>
                        </div>
                        <div class="text-xs text-right text-emerald-600">JPL星历</div>
                    </div>

                    <div class="flex justify-center mb-4">
                        <canvas id="astro-clock" width="640" height="640" class="max-w-full"></canvas>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <div class="flex items-center gap-2">
                            <button onclick="toggleSimulation()" class="px-4 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl flex items-center gap-2 shadow">
                                <i class="fa-solid fa-play" id="sim-icon"></i>
                                <span id="sim-text">连续模拟</span>
                            </button>
                            <button onclick="resetToNow()" class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-xl">回到现在</button>
                        </div>
                        <div class="flex-1 max-w-xs ml-4">
                            <input type="range" id="time-slider" min="0" max="1440" step="1" value="0" class="w-full accent-emerald-500" oninput="updateFromSlider()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-5 space-y-4">
                <div class="bg-white/90 border border-slate-200 rounded-3xl p-4 text-center shadow-lg">
                    <div class="text-xs text-slate-500">当前节气</div>
                    <div class="text-4xl font-bold text-amber-600 mt-1" id="current-jieqi">立夏</div>
                    <div class="text-sm text-emerald-600 mt-1" id="jieqi-range">5月5日 ~ 5月20日</div>
                    <div class="text-xs text-slate-500 mt-1" id="gregorian-date">2026年5月19日</div>
                </div>

                <div class="bg-white/90 border border-slate-200 rounded-3xl p-5 shadow-lg">
                    <h3 class="font-semibold mb-3 text-sm text-slate-700">当前天干地支（精确到刻）</h3>
                    <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">
                        <div>年柱 <span class="ganzhi-value text-xl font-bold text-red-600" id="year-ganzhi">丙午</span></div>
                        <div>月柱 <span class="ganzhi-value text-xl font-bold text-slate-800" id="month-ganzhi">癸巳</span></div>
                        <div>日柱 <span class="ganzhi-value text-xl font-bold text-slate-800" id="day-ganzhi">癸巳</span></div>
                        <div>时柱 <span class="ganzhi-value text-2xl font-bold text-slate-900" id="shi-ganzhi">壬戌</span></div>
                    </div>
                    <div class="mt-3">
                        <div class="flex justify-between text-xs mb-1 text-slate-600">
                            <span id="shi-name">戌时</span>
                            <span class="text-emerald-600" id="ke-text">二刻</span>
                        </div>
                        <div class="flex gap-1" id="ke-segments"></div>
                    </div>
                </div>

                <div class="bg-white/90 border border-slate-200 rounded-3xl p-4 shadow-lg">
                    <h3 class="font-semibold mb-2 text-sm text-slate-700">七曜位置</h3>
                    <div class="grid grid-cols-2 gap-1 text-xs" id="planet-list"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const wuxingColors = {
            goldYang: '#FFD700', goldYin: '#B8860B',
            fireYang: '#FF0000', fireYin: '#B91C1C',
            earthYang: '#D2691E', earthYin: '#8B4513',
            woodYang: '#228B22', woodYin: '#006400',
            waterYang: '#1E40AF', waterYin: '#1E3A8A'
        };

        const jieqiList = [
            {name:"立春",lon:315,start:"2月4日",end:"2月18日", element: 'wood'},
            {name:"雨水",lon:330,start:"2月19日",end:"3月4日", element: 'wood'},
            {name:"惊蛰",lon:345,start:"3月5日",end:"3月19日", element: 'wood'},
            {name:"春分",lon:0,start:"3月20日",end:"4月3日", element: 'wood'},
            {name:"清明",lon:15,start:"4月4日",end:"4月19日", element: 'wood'},
            {name:"谷雨",lon:30,start:"4月20日",end:"5月4日", element: 'wood'},
            {name:"立夏",lon:45,start:"5月5日",end:"5月20日", element: 'fire'},
            {name:"小满",lon:60,start:"5月21日",end:"6月4日", element: 'fire'},
            {name:"芒种",lon:75,start:"6月5日",end:"6月20日", element: 'fire'},
            {name:"夏至",lon:90,start:"6月21日",end:"7月6日", element: 'fire'},
            {name:"小暑",lon:105,start:"7月7日",end:"7月21日", element: 'fire'},
            {name:"大暑",lon:120,start:"7月22日",end:"8月6日", element: 'fire'},
            {name:"立秋",lon:135,start:"8月7日",end:"8月22日", element: 'metal'},
            {name:"处暑",lon:150,start:"8月23日",end:"9月6日", element: 'metal'},
            {name:"白露",lon:165,start:"9月7日",end:"9月22日", element: 'metal'},
            {name:"秋分",lon:180,start:"9月23日",end:"10月7日", element: 'metal'},
            {name:"寒露",lon:195,start:"10月8日",end:"10月22日", element: 'metal'},
            {name:"霜降",lon:210,start:"10月23日",end:"11月6日", element: 'metal'},
            {name:"立冬",lon:225,start:"11月7日",end:"11月21日", element: 'water'},
            {name:"小雪",lon:240,start:"11月22日",end:"12月6日", element: 'water'},
            {name:"大雪",lon:255,start:"12月7日",end:"12月20日", element: 'water'},
            {name:"冬至",lon:270,start:"12月21日",end:"1月4日", element: 'water'},
            {name:"小寒",lon:285,start:"1月5日",end:"1月19日", element: 'water'},
            {name:"大寒",lon:300,start:"1月20日",end:"2月3日", element: 'water'}
        ];

        const lunarMansions = ["角","亢","氐","房","心","尾","箕","斗","牛","女","虚","危","室","壁","奎","娄","胃","昴","毕","觜","参","井","鬼","柳","星","张","翼","轸"];

        let currentData = {
            time: new Date(),
            year: "丙午", month: "癸巳", day: "癸巳",
            shiIndex: 10, ke: 2, keFraction: 0.3,
            sunLon: 57.84,
            planets: {
                sun: {lon:57.84, color:'#f59e0b', name:'太阳'},
                moon: {lon:91.01, color:'#64748b', name:'月亮'},
                mercury: {lon:63.39, color:'#94a3b8', name:'水星'},
                venus: {lon:89.77, color:'#ec4899', name:'金星'},
                mars: {lon:29.80, color:'#ef4444', name:'火星'},
                jupiter: {lon:111.37, color:'#22c55e', name:'木星'},
                saturn: {lon:10.70, color:'#a855f7', name:'土星'}
            }
        };

        let simulationRunning = false;
        let simInterval = null;
        let canvas, ctx;
        let baseTime = new Date();

        function getWuxingColor(element, isYang = true) {
            if (element === 'metal') return isYang ? '#FFD700' : '#B8860B';
            if (element === 'fire') return isYang ? '#FF0000' : '#B91C1C';
            if (element === 'earth') return isYang ? '#D2691E' : '#8B4513';
            if (element === 'wood') return isYang ? '#228B22' : '#006400';
            if (element === 'water') return isYang ? '#1E40AF' : '#1E3A8A';
            return '#334155';
        }

        function getCurrentJieqi(sunLon) {
            for (let i = 0; i < jieqiList.length; i++) {
                let cur = jieqiList[i].lon;
                let nxt = jieqiList[(i+1)%24].lon;
                if (nxt < cur) {
                    if (sunLon >= cur || sunLon < nxt) return jieqiList[i];
                } else {
                    if (sunLon >= cur && sunLon < nxt) return jieqiList[i];
                }
            }
            return jieqiList[0];
        }

        function getShiProgress(dt) {
            return ((dt.getHours()*60 + dt.getMinutes()) / 120) % 12;
        }

        function getMonthIndex(dt) {
            return dt.getMonth();
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        // 正确计算：丙午年正月庚寅
        function getMonthGanzhi(yearStem, monthIndex) {
            const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
            const branches = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
            const yearStemIndex = stems.indexOf(yearStem);
            
            // 丙午年正月为庚寅（yearStemIndex=2 → 正月 stemIndex=6 庚）
            const zhengYueStemIndex = (yearStemIndex + 4) % 10;
            const monthStemIndex = (zhengYueStemIndex + monthIndex) % 10;
            return stems[monthStemIndex] + branches[monthIndex];
        }

        function drawClock() {
            if (!canvas) { canvas = document.getElementById('astro-clock'); ctx = canvas.getContext('2d'); }
            const w = canvas.width, h = canvas.height;
            const cx = w/2, cy = h/2;
            const R = Math.min(w,h)/2 - 12;

            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = '#f8fafc';
            ctx.beginPath(); ctx.arc(cx,cy,R+8,0,Math.PI*2); ctx.fill();

            // ===== 24节气外环 =====
            const jieqiR = R + 5;
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(cx,cy,jieqiR,0,Math.PI*2); ctx.stroke();

            ctx.font = 'bold 22px "Noto Sans SC"'; ctx.textAlign = 'center';
            // 24节气盘：立春放在正上方（对应庚寅月第一天）
            for (let i = 0; i < 24; i++) {
                const jq = jieqiList[i];
                // 调整角度，使立春（315°）位于顶部
                const a = (jq.lon - 315) * Math.PI / 180 - Math.PI / 2;
                const tx = cx + (jieqiR - 18) * Math.cos(a);
                const ty = cy + (jieqiR - 18) * Math.sin(a);
                ctx.save(); ctx.translate(tx, ty); ctx.rotate(a + Math.PI/2);
                ctx.fillStyle = getWuxingColor(jq.element, true);
                ctx.fillText(jq.name, 0, 0); ctx.restore();
            }

            for (let i = 0; i < 24; i++) {
                const jq = jieqiList[i];
                const baseLon = jq.lon;
                let a = (baseLon - 315) * Math.PI / 180 - Math.PI / 2;
                ctx.strokeStyle = getWuxingColor(jq.element, true); ctx.lineWidth = 2.5;
                let r1 = jieqiR - 3, r2 = jieqiR - 12;
                ctx.beginPath(); ctx.moveTo(cx + r1*Math.cos(a), cy + r1*Math.sin(a));
                ctx.lineTo(cx + r2*Math.cos(a), cy + r2*Math.sin(a)); ctx.stroke();

                for (let j = 1; j < 15; j++) {
                    const smallLon = baseLon + j;
                    a = (smallLon - 315) * Math.PI / 180 - Math.PI / 2;
                    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.8;
                    r1 = jieqiR - 3; r2 = jieqiR - 6;
                    ctx.beginPath(); ctx.moveTo(cx + r1*Math.cos(a), cy + r1*Math.sin(a));
                    ctx.lineTo(cx + r2*Math.cos(a), cy + r2*Math.sin(a)); ctx.stroke();
                }
            }

            // ===== 创意精密天度刻度层 (Precision Celestial Scale Layer) =====
            // 专家设计：为24节气添加每日微刻度 + 旬/气节点标注，体现“观天之精细”与易学“微而显”的理念。
            // 结合天文学：刻度严格对应黄道经度，每节气约15°，每日约1°。
            // 为干支月添加动态日刻度 + 初/中/晦标注，精确反映当月实际天数。
            // 增加极细当前精确位置指示线（subtle precision indicator），不干扰整体观象。

            // 24节气每日微刻度 (微刻度 inside the ring)
            ctx.strokeStyle = 'rgba(100, 116, 139, 0.6)';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < 24; i++) {
                const jq = jieqiList[i];
                const baseA = (jq.lon - 315) * Math.PI / 180 - Math.PI / 2;
                for (let j = 0; j < 15; j++) {  // ~15 days per Jieqi
                    const microA = baseA + (j * (15 * Math.PI / 180 / 15)); // spread over ~15°
                    const r1 = jieqiR - 25;
                    const r2 = (j % 5 === 0) ? jieqiR - 18 : jieqiR - 22; // longer every 5 days
                    ctx.beginPath();
                    ctx.moveTo(cx + r1 * Math.cos(microA), cy + r1 * Math.sin(microA));
                    ctx.lineTo(cx + r2 * Math.cos(microA), cy + r2 * Math.sin(microA));
                    ctx.stroke();
                }
            }

            // 节气关键节点小标注 (e.g. "起", "中")
            ctx.font = '10px "Noto Sans SC"';
            ctx.fillStyle = '#64748b';
            for (let i = 0; i < 24; i++) {
                const jq = jieqiList[i];
                const a = (jq.lon - 315) * Math.PI / 180 - Math.PI / 2;
                const tx = cx + (jieqiR - 30) * Math.cos(a);
                const ty = cy + (jieqiR - 30) * Math.sin(a);
                ctx.save();
                ctx.translate(tx, ty);
                ctx.rotate(a + Math.PI / 2);
                ctx.fillText(i % 2 === 0 ? '起' : '中', 0, 0); // 起=节气开始, 中=中气
                ctx.restore();
            }

            // ===== 24节气当前精确指针 (已修正角度，动态指向正确节气) =====
            const curJq = getCurrentJieqi(currentData.sunLon);
            const jqAngle = (currentData.sunLon - 315) * Math.PI / 180 - Math.PI / 2;  // 与标签/刻度完全一致

            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + (jieqiR - 10) * Math.cos(jqAngle), cy + (jieqiR - 10) * Math.sin(jqAngle));
            ctx.stroke();

            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(cx + (jieqiR - 10) * Math.cos(jqAngle), cy + (jieqiR - 10) * Math.sin(jqAngle), 7, 0, Math.PI * 2);
            ctx.fill();

            // ===== 月份干支盘 + 精确到天刻度（已移除指针，增强标注） =====
            const monthR = R * 0.82;
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(cx,cy,monthR,0,Math.PI*2); ctx.stroke();

            ctx.font = 'bold 14px "Noto Sans SC"'; ctx.textAlign = 'center';
            for (let i = 0; i < 12; i++) {
                const a = (i * 30 - 90) * Math.PI / 180;
                const tx = cx + (monthR - 16) * Math.cos(a);
                const ty = cy + (monthR - 16) * Math.sin(a);
                ctx.save(); ctx.translate(tx, ty); ctx.rotate(a + Math.PI/2);
                const mg = getMonthGanzhi(currentData.year[0], i);
                ctx.fillStyle = '#334155';
                ctx.fillText(mg, 0, 0); ctx.restore();
            }

            const daysInMonth = getDaysInMonth(currentData.time.getFullYear(), currentData.time.getMonth());
            const dayOfMonth = currentData.time.getDate();
            for (let d = 0; d < daysInMonth; d++) {
                const angle = (d / daysInMonth * 360 - 90) * Math.PI / 180;
                ctx.strokeStyle = (d === dayOfMonth - 1) ? '#1e40af' : '#cbd5e1';
                ctx.lineWidth = (d === dayOfMonth - 1) ? 2 : 0.8;
                const r1 = monthR - 3;
                const r2 = (d === dayOfMonth - 1) ? monthR - 10 : monthR - 6;
                ctx.beginPath(); ctx.moveTo(cx + r1*Math.cos(angle), cy + r1*Math.sin(angle));
                ctx.lineTo(cx + r2*Math.cos(angle), cy + r2*Math.sin(angle)); ctx.stroke();
            }

            // 干支月精确日刻度增强标注 (创意：旬与初/中/晦)
            ctx.font = '9px "Noto Sans SC"';
            ctx.fillStyle = '#1e40af';
            const keyDays = [0, Math.floor(daysInMonth / 3), Math.floor(daysInMonth * 2 / 3), daysInMonth - 1];
            const keyLabels = ['初一', '初十', '二十', '月尽'];
            for (let k = 0; k < keyDays.length; k++) {
                const d = keyDays[k];
                if (d >= 0 && d < daysInMonth) {
                    const angle = (d / daysInMonth * 360 - 90) * Math.PI / 180;
                    const tx = cx + (monthR - 28) * Math.cos(angle);
                    const ty = cy + (monthR - 28) * Math.sin(angle);
                    ctx.save();
                    ctx.translate(tx, ty);
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillText(keyLabels[k], 0, 0);
                    ctx.restore();
                }
            }

            // ===== 月度干支当前精确指针 (修正：始终指向当前干支月扇区中心，清晰准确) =====
            const monthIdx = getMonthIndex(currentData.time);
            const monthCenterAngle = (monthIdx * 30 + 15 - 90) * Math.PI / 180;  // 指向扇区正中心，与标签对齐

            ctx.strokeStyle = '#1e40af';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + (monthR - 25) * Math.cos(monthCenterAngle), cy + (monthR - 25) * Math.sin(monthCenterAngle));
            ctx.stroke();

            ctx.fillStyle = '#1e40af';
            ctx.beginPath();
            ctx.arc(cx + (monthR - 25) * Math.cos(monthCenterAngle), cy + (monthR - 25) * Math.sin(monthCenterAngle), 6, 0, Math.PI * 2);
            ctx.fill();

            // ===== 黄道 + 28宿 =====
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

            ctx.fillStyle = '#1e2937'; ctx.font = '7.5px "Noto Sans SC"';
            const xiuStep = 360/28;
            for (let i=0; i<28; i++) {
                const d = i*xiuStep + 2;
                const a = (d-90)*Math.PI/180;
                const tx = cx + (R-30)*Math.cos(a);
                const ty = cy + (R-30)*Math.sin(a);
                ctx.save(); ctx.translate(tx,ty); ctx.rotate(a + Math.PI/2);
                ctx.fillText(lunarMansions[i], 0, 0); ctx.restore();
            }

            // ===== 时辰内环（8刻，字体放大3倍） =====
            const innerR = R * 0.52;
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(cx,cy,innerR,0,Math.PI*2); ctx.stroke();

            const shiNames = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
            const shiProg = getShiProgress(currentData.time);
            const shiIdx = Math.floor(shiProg);
            const shiFrac = shiProg - shiIdx;
            const startA = (shiIdx*30 - 90)*Math.PI/180;
            const wedge = shiFrac * (30*Math.PI/180);

            ctx.fillStyle = 'rgba(245, 158, 11, 0.25)';
            ctx.beginPath(); ctx.moveTo(cx,cy);
            ctx.arc(cx,cy,innerR*1.1, startA, startA+wedge); ctx.closePath(); ctx.fill();

            ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(cx,cy,innerR*1.1, startA, startA+wedge); ctx.stroke();

            for (let i=0; i<12; i++) {
                const mid = (i*30-90+15)*Math.PI/180;
                const lx = cx + innerR*0.62 * Math.cos(mid);
                const ly = cy + innerR*0.62 * Math.sin(mid);
                ctx.fillStyle = (i===shiIdx) ? '#b45309' : '#1e2937';
                ctx.font = (i===shiIdx) ? 'bold 24px "Noto Sans SC"' : '18px "Noto Sans SC"';
                ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(shiNames[i]+'时', lx, ly);
            }

            for (let i = 0; i < 12; i++) {
                const baseA = (i*30 - 90) * Math.PI / 180;
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2.2;
                let r1 = innerR * 1.05, r2 = innerR * 0.92;
                ctx.beginPath(); ctx.moveTo(cx + r1*Math.cos(baseA), cy + r1*Math.sin(baseA));
                ctx.lineTo(cx + r2*Math.cos(baseA), cy + r2*Math.sin(baseA)); ctx.stroke();

                for (let k = 1; k < 8; k++) {
                    const keA = baseA + (k * 3.75 * Math.PI / 180);
                    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1;
                    r1 = innerR * 1.05; r2 = innerR * 0.97;
                    ctx.beginPath(); ctx.moveTo(cx + r1*Math.cos(keA), cy + r1*Math.sin(keA));
                    ctx.lineTo(cx + r2*Math.cos(keA), cy + r2*Math.sin(keA)); ctx.stroke();
                }
            }

            const cA = startA + wedge/2;
            ctx.strokeStyle = '#b45309'; ctx.lineWidth = 6; ctx.lineCap='round';
            ctx.beginPath(); ctx.moveTo(cx,cy);
            ctx.lineTo(cx + innerR*0.35*Math.cos(cA), cy + innerR*0.35*Math.sin(cA));
            ctx.stroke();

            const kA = startA + currentData.keFraction * wedge;
            ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx,cy);
            ctx.lineTo(cx + innerR*0.5*Math.cos(kA), cy + innerR*0.5*Math.sin(kA));
            ctx.stroke();

            const planetR = R * 0.68;  // 放在月度盘内侧，避免遮挡
            Object.keys(currentData.planets).forEach(key => {
                const p = currentData.planets[key];
                const angle = (p.lon - 90) * Math.PI / 180;
                const px = cx + planetR * Math.cos(angle);
                const py = cy + planetR * Math.sin(angle);

                ctx.shadowColor = p.color; ctx.shadowBlur = 8;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#1e2937';
                ctx.font = 'bold 11px "Noto Sans SC"';
                ctx.textAlign = 'center';
                const labelR = planetR + 20;
                const lx = cx + labelR * Math.cos(angle);
                const ly = cy + labelR * Math.sin(angle);
                ctx.fillText(p.name, lx, ly);
            });

            ctx.fillStyle = '#0ea5e9';
            ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
        }

        function updateUI() {
            const now = currentData.time;
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN',{hour12:false}) + ' CST';

            const gregorian = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            const gregorianEl = document.getElementById('gregorian-date');
            if (gregorianEl) gregorianEl.textContent = gregorian;

            const jq = getCurrentJieqi(currentData.sunLon);
            document.getElementById('current-jieqi').textContent = jq.name;
            document.getElementById('jieqi-range').textContent = `${jq.start} ~ ${jq.end}`;

            document.getElementById('year-ganzhi').textContent = currentData.year;
            document.getElementById('month-ganzhi').textContent = currentData.month;
            document.getElementById('day-ganzhi').textContent = currentData.day;
            document.getElementById('shi-ganzhi').textContent = currentData.shi || '壬戌';

            const shiFull = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];
            document.getElementById('shi-name').textContent = shiFull[Math.floor(getShiProgress(now))];

            const keNames = ['初刻','二刻','三刻','四刻','五刻','六刻','七刻','八刻'];
            document.getElementById('ke-text').textContent = keNames[currentData.ke] || '';

            const keCont = document.getElementById('ke-segments');
            keCont.innerHTML = '';
            for(let i=0; i<8; i++){
                const d = document.createElement('div');
                d.className = `h-2 flex-1 rounded ${i <= currentData.ke ? 'bg-amber-500' : 'bg-slate-300'}`;
                keCont.appendChild(d);
            }

            const list = document.getElementById('planet-list');
            list.innerHTML = '';
            Object.keys(currentData.planets).forEach(k => {
                const p = currentData.planets[k];
                const el = document.createElement('div');
                el.className = 'flex justify-between items-center bg-slate-50 px-2 py-1 rounded text-xs border border-slate-200';
                el.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span style="color:${p.color}" class="w-2.5 h-2.5 rounded-full inline-block"></span>
                        <span class="font-medium">${p.name}</span>
                    </div>
                    <span class="font-mono">${p.lon.toFixed(1)}°</span>
                `;
                list.appendChild(el);
            });

            drawClock();
        }

        function updatePlanetPositions(hoursDelta) {
            const speeds = {sun:0.04, moon:0.55, mercury:1.5, venus:1.15, mars:0.08, jupiter:0.028, saturn:0.01};
            Object.keys(currentData.planets).forEach(key => {
                const p = currentData.planets[key];
                p.lon = (p.lon + hoursDelta * (speeds[key]||0.05)) % 360;
                if(p.lon < 0) p.lon += 360;
            });
            currentData.sunLon = currentData.planets.sun.lon;
        }

        function updateFromSlider() {
            const min = parseInt(document.getElementById('time-slider').value);
            const simT = new Date(baseTime.getTime() + min*60000);
            currentData.time = simT;

            const prog = getShiProgress(simT);
            currentData.shiIndex = Math.floor(prog);
            currentData.keFraction = prog - currentData.shiIndex;
            currentData.ke = Math.min(7, Math.floor(currentData.keFraction * 8));

            currentData.shi = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'][currentData.shiIndex%10] + 
                              ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'][currentData.shiIndex];

            // 实时联动更新月柱和日柱
            currentData.month = getMonthGanzhi(currentData.year[0], simT.getMonth());
            currentData.day = "癸巳"; // 简化，实际可进一步计算

            updatePlanetPositions(min/60);
            updateUI();
        }

        function toggleSimulation() {
            simulationRunning = !simulationRunning;
            const icon = document.getElementById('sim-icon');
            const txt = document.getElementById('sim-text');

            if(simulationRunning){
                icon.classList.replace('fa-play','fa-pause');
                txt.textContent = '暂停';
                simInterval = setInterval(()=>{
                    const s = document.getElementById('time-slider');
                    let v = parseInt(s.value) + 4;
                    if(v>1440) v=0;
                    s.value = v;
                    updateFromSlider();
                },650);
            }else{
                icon.classList.replace('fa-pause','fa-play');
                txt.textContent = '连续模拟';
                clearInterval(simInterval);
            }
        }

        function resetToNow() {
            if(simulationRunning) toggleSimulation();
            currentData.time = new Date();
            document.getElementById('time-slider').value = 0;
            baseTime = new Date();

            currentData.planets.sun.lon=57.84; currentData.planets.moon.lon=91.01;
            currentData.planets.mercury.lon=63.39; currentData.planets.venus.lon=89.77;
            currentData.planets.mars.lon=29.80; currentData.planets.jupiter.lon=111.37;
            currentData.planets.saturn.lon=10.70;
            currentData.sunLon = 57.84;

            updateUI();
        }

        function init() {
            canvas = document.getElementById('astro-clock');
            ctx = canvas.getContext('2d');
            baseTime = new Date(currentData.time);

            const p = getShiProgress(currentData.time);
            currentData.shiIndex = Math.floor(p);
            currentData.keFraction = p - currentData.shiIndex;
            currentData.ke = Math.min(7, Math.floor(currentData.keFraction * 8));
            currentData.shi = '壬戌';

            updateUI();

            setInterval(()=>{
                if(!simulationRunning){
                    currentData.time = new Date();
                    document.getElementById('current-time').textContent = currentData.time.toLocaleTimeString('zh-CN',{hour12:false})+' CST';
                }
            },1000);
        }

        window.onload = init;
    </script>
</body>
</html>
