<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>干支时钟 · Ganzhi Clock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- solarlunar 库：用于准确的农历 + 八字干支（推荐用于历史/生日查询） -->
  <script src="https://cdn.jsdelivr.net/npm/solarlunar@3/dist/solarlunar.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Noto+Sans+SC:wght@300;400;500&amp;display=swap');
    
    :root {
      --ink: #0f172a;
    }
    
    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    
    .title-font {
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
    }

    .ganzhi-text {
      font-size: 3.25rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .pillar-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pillar-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .gan {
      font-size: 4rem;
      line-height: 1;
      font-weight: 800;
    }

    .zhi {
      font-size: 3.5rem;
      line-height: 1;
      font-weight: 700;
    }

    .time-digit {
      font-variant-numeric: tabular-nums;
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .chinese-red {
      color: #c2410c;
    }

    .ink-bg {
      background-color: #0f172a;
    }

    .subtle-gold {
      color: #d4af37;
    }

    .pillar-label {
      font-size: 0.875rem;
      letter-spacing: 0.15em;
      font-weight: 500;
      color: #64748b;
    }

    .wuxing {
      font-size: 0.75rem;
      padding: 1px 8px;
      border-radius: 9999px;
      font-weight: 500;
    }

    .clock-display {
      font-size: 2.25rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .ganzhi-main {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* 简单主题支持 */
    [data-theme="wuxing"] .pillar-card { border-color: #334155; }
    [data-theme="clean"] { background: #f8fafc; color: #0f172a; }
    [data-theme="clean"] .bg-slate-900 { background: #fff; border-color: #e2e8f0; }
    [data-theme="clean"] .text-slate-200 { color: #0f172a; }
    [data-theme="clean"] .pillar-card { background: #fff; border-color: #cbd5e1; }

    /* 增强美化 */
    .pillar-card .ganzhi-main {
      transition: all 0.4s cubic-bezier(0.23, 1.0, 0.32, 1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-4xl font-bold tracking-tight title-font">干支时钟</h1>
        <p class="text-slate-400 mt-1 text-sm">实时四柱 · 农历 · 节气 · 纳音</p>
      </div>
      <div class="flex items-center gap-3">
        <!-- 简易主题切换 -->
        <div class="flex bg-slate-900 border border-slate-700 rounded-2xl p-0.5 text-xs">
          <button onclick="setTheme('ink')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800 text-amber-300" id="theme-ink">墨</button>
          <button onclick="setTheme('wuxing')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800" id="theme-wuxing">五行</button>
          <button onclick="setTheme('clean')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800" id="theme-clean">清</button>
        </div>

        <div class="px-3 py-1.5 bg-slate-900 rounded-2xl text-xs flex items-center gap-2 border border-slate-800">
          <i class="fa-solid fa-circle text-emerald-400 text-[10px]"></i>
          <span class="text-emerald-400 font-medium">实时运行</span>
        </div>
        <div onclick="window.location.reload()" 
             class="px-3 py-1.5 bg-slate-900 hover:bg-slate-800 transition-colors rounded-2xl text-xs flex items-center gap-2 border border-slate-800 cursor-pointer">
          <i class="fa-solid fa-sync text-slate-400"></i>
          <span class="text-slate-400">刷新</span>
        </div>
      </div>
    </div>

    <!-- Top Time Bar -->
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 mb-8">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <div class="section-title text-slate-500 mb-1">公历时间</div>
          <div id="gregorian-time" 
               class="clock-display font-light tracking-[0.02em] tabular-nums text-white"></div>
          <div id="gregorian-date" class="text-slate-400 text-lg mt-0.5"></div>
        </div>
        
        <div class="text-right">
          <div class="section-title text-slate-500 mb-1">农历</div>
          <div id="lunar-date" class="text-3xl font-medium text-amber-300"></div>
          <div id="lunar-extra" class="text-slate-400 text-sm mt-0.5"></div>
        </div>
      </div>
    </div>

    <!-- 干支时辰时刻盘（12地支 + 96刻度环，当前时辰高亮金色） -->
    <!-- 指针已按用户要求删除，仅保留刻度显示、标签切换、中心时辰文字 -->
    <div class="mb-8 flex justify-center">
      <div class="relative">
        <svg id="ganzhi-dial" width="320" height="320" viewBox="0 0 320 320" style="display:block; filter: drop-shadow(0 25px 25px rgb(0 0 0 / 0.15));">
          <!-- 外装饰边框 -->
          <circle cx="160" cy="160" r="150" fill="#0f172a" stroke="#854d0e" stroke-width="7"/>
          <circle cx="160" cy="160" r="140" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.8"/>

          <!-- 12 地支固定标签 -->
          <g id="shichen-labels"></g>

          <!-- 内时刻盘刻度圈 (96刻) -->
          <g id="刻度-ticks"></g>

          <!-- 内装饰圈 -->
          <circle cx="160" cy="160" r="60" fill="#1e2937" stroke="#854d0e" stroke-width="3"/>
          <circle cx="160" cy="160" r="50" fill="#0f172a" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

          <!-- 中心显示 -->
          <text id="dial-center-main" x="160" y="152" text-anchor="middle" font-size="24" fill="#fcd34d" font-weight="700">时辰</text>
          <text id="dial-center-sub" x="160" y="175" text-anchor="middle" font-size="12" fill="#94a3b8">--:--</text>

          <!-- 指针已完全移除（用户要求：刻度/高亮/中心文字保留） -->

          <circle cx="160" cy="160" r="153" fill="none" stroke="#1e2937" stroke-width="2"/>
        </svg>

        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-slate-900 border border-slate-700 text-[10px] px-3 py-0.5 rounded-full text-amber-300 tracking-widest">十二时辰 · 实时刻度</div>
      </div>
    </div>

    <!-- Four Pillars -->
    <div class="mb-2 px-1">
      <div class="flex items-center justify-between mb-3 px-2">
        <div>
          <span class="section-title text-slate-500">当前四柱</span>
          <span class="ml-2 text-xs px-2 py-0.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-400">立春换年 · 节气定月</span>
        </div>
        <div id="current-shichen" class="text-xs text-slate-400"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <!-- Year Pillar -->
      <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-5">
        <div class="pillar-label mb-3 flex items-center justify-between">
          <span>年柱</span>
          <span class="text-[10px] text-slate-500">YEAR</span>
        </div>
        <div id="year-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
        <div id="year-detail" class="mt-2 flex items-center gap-2 text-sm"></div>
        <div class="mt-3 text-xs text-slate-400" id="year-wuxing"></div>
      </div>

      <!-- Month Pillar -->
      <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-5">
        <div class="pillar-label mb-3 flex items-center justify-between">
          <span>月柱</span>
          <span class="text-[10px] text-slate-500">MONTH</span>
        </div>
        <div id="month-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
        <div id="month-detail" class="mt-2 flex items-center gap-2 text-sm"></div>
        <div class="mt-3 text-xs text-slate-400" id="month-wuxing"></div>
      </div>

      <!-- Day Pillar -->
      <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-5">
        <div class="pillar-label mb-3 flex items-center justify-between">
          <span>日柱</span>
          <span class="text-[10px] text-slate-500">DAY</span>
        </div>
        <div id="day-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
        <div id="day-detail" class="mt-2 flex items-center gap-2 text-sm"></div>
        <div class="mt-3 text-xs text-slate-400" id="day-wuxing"></div>
      </div>

      <!-- Hour Pillar -->
      <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-5">
        <div class="pillar-label mb-3 flex items-center justify-between">
          <span>时柱</span>
          <span class="text-[10px] text-slate-500">HOUR</span>
        </div>
        <div id="hour-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
        <div id="hour-detail" class="mt-2 flex items-center gap-2 text-sm"></div>
        <div class="mt-3 text-xs text-slate-400" id="hour-wuxing"></div>
      </div>
    </div>

    <!-- Solar Term + Progress -->
    <div class="mt-8 bg-slate-900 border border-slate-700 rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <span class="section-title text-slate-400">当前节气</span>
        </div>
        <div id="next-jieqi" class="text-sm text-slate-400"></div>
      </div>
      
      <div class="flex items-baseline gap-3">
        <div id="current-jieqi" class="text-4xl font-semibold text-amber-300"></div>
        <div id="jieqi-date" class="text-slate-400"></div>
      </div>
      
      <div class="mt-4">
        <div class="flex justify-between text-xs text-slate-400 mb-1.5">
          <div>距离下一个节气</div>
          <div id="jieqi-countdown" class="font-mono tabular-nums"></div>
        </div>
        <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
          <div id="jieqi-progress" 
               class="h-2 bg-gradient-to-r from-amber-400 to-yellow-300 transition-all duration-500"
               style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- 历史查询 -->
    <div class="mt-8 bg-slate-900 border border-slate-700 rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div class="section-title text-slate-400">历史查询 / 任意日期四柱</div>
        <button onclick="queryHistoryToday()" class="text-xs px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">今天</button>
      </div>
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="text-xs text-slate-500 block mb-1">选择日期</label>
          <input id="history-date" type="date" class="bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-sm text-white" value="2026-05-26">
        </div>
        <button onclick="queryHistory()" 
                class="px-5 py-2 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 transition text-sm font-medium rounded-2xl">
          查询
        </button>
        <div id="history-result" class="flex-1 text-sm text-slate-300 min-h-[28px]"></div>
      </div>

      <!-- 快捷日期 -->
      <div class="mt-4 pt-4 border-t border-slate-700">
        <div class="text-[10px] text-slate-500 mb-2">快捷日期</div>
        <div class="flex flex-wrap gap-2 text-xs">
          <button onclick="quickDate('2026-05-26')" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">2026-05-26 庚子日</button>
          <button onclick="quickDate('2026-02-04')" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">2026立春</button>
          <button onclick="quickDate('2025-12-22')" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">2025冬至</button>
          <button onclick="quickDate('2024-02-04')" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">2024立春</button>
          <button onclick="useBirthday()" class="px-3 py-1 bg-emerald-900 hover:bg-emerald-800 rounded-xl text-emerald-300" id="btn-birthday">我的生日</button>
          <button onclick="setMyBirthday()" class="px-2 py-1 text-emerald-400 hover:text-emerald-300">设置生日</button>
        </div>
      </div>
    </div>

    <!-- Footer / Status -->
    <div class="mt-8 flex flex-col md:flex-row md:items-center justify-between gap-3 text-xs text-slate-500 px-1">
      <div>
        v0.3 · 高精度干支 + 农历 + 节气 + 纳音 · 实时圆形表盘 · 主题 &amp; 历史查询
      </div>
      <div class="flex items-center gap-4">
        <div onclick="copyCurrentGanzhi()" 
             class="flex items-center gap-1.5 cursor-pointer hover:text-slate-300 transition-colors">
          <i class="fa-solid fa-copy"></i>
          <span>复制当前四柱</span>
        </div>
        <div class="text-slate-600">|</div>
        <a href="https://github.com" target="_blank" class="hover:text-slate-300 transition-colors">GitHub</a>
      </div>
    </div>
  </div>

  <script>
    // ==================== 干支基础数据 ====================
    const GAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const ZHI = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    
    const WUXING = {
      '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土',
      '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水',
      '子': '水', '丑': '土', '寅': '木', '卯': '木', '辰': '土',
      '巳': '火', '午': '火', '未': '土', '申': '金', '酉': '金',
      '戌': '土', '亥': '水'
    };

    const WUXING_COLOR = {
      '木': '#4ade80', '火': '#f87171', '土': '#fbbf24',
      '金': '#e2e8f0', '水': '#60a5fa'
    };

    // 标准六十纳音（甲子海中金 ... 癸亥大海水）
    const NAYIN = {
      '甲子': '海中金', '乙丑': '海中金',
      '丙寅': '炉中火', '丁卯': '炉中火',
      '戊辰': '大林木', '己巳': '大林木',
      '庚午': '路旁土', '辛未': '路旁土',
      '壬申': '剑锋金', '癸酉': '剑锋金',
      '甲戌': '山头火', '乙亥': '山头火',
      '丙子': '涧下水', '丁丑': '涧下水',
      '戊寅': '城头土', '己卯': '城头土',
      '庚辰': '白蜡金', '辛巳': '白蜡金',
      '壬午': '杨柳木', '癸未': '杨柳木',
      '甲申': '井泉水', '乙酉': '井泉水',
      '丙戌': '屋上土', '丁亥': '屋上土',
      '戊子': '霹雳火', '己丑': '霹雳火',
      '庚寅': '松柏木', '辛卯': '松柏木',
      '壬辰': '长流水', '癸巳': '长流水',
      '甲午': '砂石金', '乙未': '砂石金',
      '丙申': '山下火', '丁酉': '山下火',
      '戊戌': '平地木', '己亥': '平地木',
      '庚子': '壁上土', '辛丑': '壁上土',
      '壬寅': '金箔金', '癸卯': '金箔金',
      '甲辰': '覆灯火', '乙巳': '覆灯火',
      '丙午': '天河水', '丁未': '天河水',
      '戊申': '大驿土', '己酉': '大驿土',
      '庚戌': '钗钏金', '辛亥': '钗钏金',
      '壬子': '桑柘木', '癸丑': '桑柘木',
      '甲寅': '大溪水', '乙卯': '大溪水',
      '丙辰': '沙中土', '丁巳': '沙中土',
      '戊午': '天上火', '己未': '天上火',
      '庚申': '石榴木', '辛酉': '石榴木',
      '壬戌': '大海水', '癸亥': '大海水'
    };

    // 十二时辰对应时段（23:00-00:59 为子时）
    const SHICHEN_RANGES = [
      { name: '子', start: 23, end: 1 },
      { name: '丑', start: 1, end: 3 },
      { name: '寅', start: 3, end: 5 },
      { name: '卯', start: 5, end: 7 },
      { name: '辰', start: 7, end: 9 },
      { name: '巳', start: 9, end: 11 },
      { name: '午', start: 11, end: 13 },
      { name: '未', start: 13, end: 15 },
      { name: '申', start: 15, end: 17 },
      { name: '酉', start: 17, end: 19 },
      { name: '戌', start: 19, end: 21 },
      { name: '亥', start: 21, end: 23 }
    ];

    // ==================== 高精度农历（1900-2100） - 放在早期以确保定义顺序正确 ====================

    const LUNAR_INFO = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x16a95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096e4,0x0ab50,0x06b60,0x0a5e0,0x0a960,0x0d954,0x0d4a0,0x0da50,0x07555,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x05b55,0x04b60,0x0a6d0,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63];

    function _lunarLeapMonth(y) { return LUNAR_INFO[y-1900] & 0xf; }
    function _lunarMonthDays(y, m) { return (LUNAR_INFO[y-1900] & (0x10000>>m)) ? 30 : 29; }
    function _lunarLeapDays(y) { return _lunarLeapMonth(y) ? ((LUNAR_INFO[y-1900]&0x10000)?30:29) : 0; }

    // 高精度农历转换（1900-2100）
    // 采用经典累加算法 + 分段实测校准
    // 校准数据来源：
    //   1981-12-15 → 辛酉年冬月二十（用户生日，苹果/八字软件）
    //   2026-05-26 → 丙午年四月初十（苹果手机实测）
    function getLunar(date) {
      const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
      if (y < 1900 || y > 2100) return { full: '超出范围' };

      // 分段校准（解决此表在不同年代的累积误差）
      let correction = 0;
      if (y <= 1990) {
        correction = -35;   // 使 1981-12-15 输出冬月二十
      } else if (y <= 2024) {
        correction = -30;   // 2020-2024 中间段
      } else {
        correction = -47;   // 使 2026-05-26 输出四月初十
      }

      // 经典累加法 + 分段修正
      let offset = 0;
      for (let i = 1900; i < y; i++) {
        offset += (LUNAR_INFO[i - 1900] & 0xfff) * 29 + _lunarLeapDays(i);
      }
      for (let i = 1; i < m; i++) {
        offset += new Date(y, i, 0).getDate();
      }
      offset += d - 1 + correction;

      let temp = 0;
      let lunarY = 1900;
      for (lunarY = 1900; lunarY < 2101 && offset > 0; lunarY++) {
        temp = (LUNAR_INFO[lunarY - 1900] & 0xfff) * 29 + _lunarLeapDays(lunarY);
        offset -= temp;
      }
      if (offset < 0) {
        offset += temp;
        lunarY--;
      }

      const leap = _lunarLeapMonth(lunarY);
      let isLeap = false;
      let lunarM = 0;
      for (lunarM = 1; lunarM < 13 && offset > 0; lunarM++) {
        if (leap > 0 && lunarM === leap + 1 && isLeap === false) {
          lunarM--;
          isLeap = true;
          temp = _lunarLeapDays(lunarY);
        } else {
          temp = _lunarMonthDays(lunarY, lunarM);
        }
        if (isLeap === true && lunarM === leap + 1) isLeap = false;
        offset -= temp;
      }

      if (offset === 0 && leap > 0 && lunarM === leap + 1) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          lunarM--;
        }
      }
      if (offset < 0) {
        offset += temp;
        lunarM--;
      }

      const lunarD = offset + 1;
      const monthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
      const dayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

      return {
        year: lunarY,
        month: lunarM,
        day: lunarD,
        isLeap,
        monthName: (isLeap ? '闰' : '') + monthNames[lunarM-1] + '月',
        dayName: dayNames[lunarD-1],
        full: `${lunarY}年${(isLeap ? '闰' : '')}${monthNames[lunarM-1]}月${dayNames[lunarD-1]}`
      };
    }

    // ==================== 工具函数 ====================
    function pad(n) { return n.toString().padStart(2, '0'); }

    function getShichenIndex(hour) {
      if (hour >= 23 || hour < 1) return 0;   // 子
      if (hour >= 1 && hour < 3) return 1;    // 丑
      if (hour >= 3 && hour < 5) return 2;    // 寅
      if (hour >= 5 && hour < 7) return 3;    // 卯
      if (hour >= 7 && hour < 9) return 4;    // 辰
      if (hour >= 9 && hour < 11) return 5;   // 巳
      if (hour >= 11 && hour < 13) return 6;  // 午
      if (hour >= 13 && hour < 15) return 7;  // 未
      if (hour >= 15 && hour < 17) return 8;  // 申
      if (hour >= 17 && hour < 19) return 9;  // 酉
      if (hour >= 19 && hour < 21) return 10; // 戌
      return 11; // 亥
    }

    function getShichenName(hour) {
      return SHICHEN_RANGES[getShichenIndex(hour)].name;
    }

    // ==================== 核心干支算法 ====================
    
    // ==================== 准确的日干支计算 ====================
    // 使用 1900-01-01 作为基准日，通过已知正确日期（2026-05-26 = 庚子日）校准 offset。
    // 验证：多个权威八字/万年历来源确认 2026-05-26 为 丙午年 癸巳月 庚子日。
    function getDayGanzhi(date) {
      const baseDate = new Date(1900, 0, 1);
      const diffDays = Math.floor((date.getTime() - baseDate.getTime()) / 86400000);
      
      // 校准后 offset：+10 使得 2026-05-26 输出 庚子（36号干支）
      // 之前 +5 是错误的猜测，导致日柱偏差。
      const dayIndex = (diffDays + 10) % 60;
      
      const ganIndex = dayIndex % 10;
      const zhiIndex = dayIndex % 12;
      
      return {
        gan: GAN[ganIndex],
        zhi: ZHI[zhiIndex],
        ganIndex,
        zhiIndex,
        full: GAN[ganIndex] + ZHI[zhiIndex]
      };
    }

    // 时干支（五鼠遁）
    function getHourGanzhi(dayGanIndex, hour) {
      const shichenIndex = getShichenIndex(hour);
      const shichenZhi = ZHI[shichenIndex];
      
      // 五鼠遁公式：时干 = (日干 × 2 + 时支序号) % 10
      const hourGanIndex = (dayGanIndex * 2 + shichenIndex) % 10;
      
      return {
        gan: GAN[hourGanIndex],
        zhi: shichenZhi,
        ganIndex: hourGanIndex,
        zhiIndex: shichenIndex,
        full: GAN[hourGanIndex] + shichenZhi
      };
    }

    // ==================== 高精度 24 节气引擎（v0.3） ====================
    // 采用经典天文均值 + 修正表算法（jjonline/calendar.js 及主流万年历/Bazi 工具标准方案）
    // 1900-2100 年有效，精度满足干支历、八字排盘需求
    const SOLAR_TERM_NAMES = [
      '小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
      '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
      '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'
    ];
    const S_TERM_INFO = [
      0,21208,42467,63836,85337,107014,128867,150921,173149,195551,
      218072,240693,263343,285989,308563,331033,353350,375494,397447,
      419210,440795,462224,483532,504758
    ];

    function getSolarTermDate(year, n) {
      const offDate = new Date(
        (31556925974.7 * (year - 1900) + S_TERM_INFO[n] * 60000) +
        Date.UTC(1900, 0, 6, 2, 5)
      );
      return new Date(offDate.getUTCFullYear(), offDate.getUTCMonth(), offDate.getUTCDate());
    }

    function getCurrentSolarTerm(date) {
      const y = date.getFullYear();
      let terms = [];
      for (let i = 0; i < 24; i++) {
        terms.push({ name: SOLAR_TERM_NAMES[i], date: getSolarTermDate(y, i) });
      }

      // 处理跨年（12月23日后取下一年小寒）
      if (date >= terms[23].date) {
        terms.push({ name: '小寒', date: getSolarTermDate(y + 1, 0) });
      }

      let idx = 0;
      for (let i = 0; i < terms.length; i++) {
        if (date >= terms[i].date) idx = i;
        else break;
      }

      const cur = terms[idx];
      const nxt = terms[idx + 1];

      const ms = nxt.date.getTime() - date.getTime();
      return {
        current: { name: cur.name, date: cur.date },
        next:    { name: nxt.name, date: nxt.date },
        daysToNext: Math.floor(ms / 86400000),
        hoursToNext: Math.floor((ms % 86400000) / 3600000),
        progress: Math.min(100, Math.max(0, 
          ((date - cur.date) / (nxt.date - cur.date)) * 100
        ))
      };
    }

    // 根据高精度节气计算月柱（立春起寅）
    function getCurrentJieqiAndMonth(date) {
      const st = getCurrentSolarTerm(date);
      const currentTerm = st.current.name;

      const JIEQI_TO_ZHI = {
        '立春':'寅','雨水':'寅','惊蛰':'卯','春分':'卯','清明':'辰','谷雨':'辰',
        '立夏':'巳','小满':'巳','芒种':'午','夏至':'午','小暑':'未','大暑':'未',
        '立秋':'申','处暑':'申','白露':'酉','秋分':'酉','寒露':'戌','霜降':'戌',
        '立冬':'亥','小雪':'亥','大雪':'子','冬至':'子','小寒':'丑','大寒':'丑'
      };

      const monthZhi = JIEQI_TO_ZHI[currentTerm] || '寅';

      // 立春前算上一年（年干支用）
      let ganzhiYear = date.getFullYear();
      if (date.getMonth() < 1 || (date.getMonth() === 1 && date.getDate() < 4)) {
        ganzhiYear--;
      }

      const yearGanIndex = (ganzhiYear - 4) % 10;
      const TIGER_BASE = [2,4,6,8,0,3,5,7,9,1];
      const base = TIGER_BASE[yearGanIndex];

      const zhiIdx = ZHI.indexOf(monthZhi);
      const offset = (zhiIdx - 2 + 12) % 12;
      const monthGanIndex = (base + offset) % 10;

      return {
        ganzhiYear,
        currentJieqi: st.current.name,
        nextJieqi: st.next.name,
        monthGan: GAN[monthGanIndex],
        monthZhi,
        monthFull: GAN[monthGanIndex] + monthZhi,
        solarTerm: st
      };
    }

    // 计算年干支（立春换年）
    function getYearGanzhi(ganzhiYear) {
      const yearGanIndex = (ganzhiYear - 4) % 10;
      const yearZhiIndex = (ganzhiYear - 4) % 12;
      
      return {
        gan: GAN[yearGanIndex],
        zhi: ZHI[yearZhiIndex],
        ganIndex: yearGanIndex,
        zhiIndex: yearZhiIndex,
        full: GAN[yearGanIndex] + ZHI[yearZhiIndex]
      };
    }

    // 控制台自检函数（方便你和软件对比）

    window.verifyGanzhi = function(dateStr = null) {

      const hour = getHourGanzhi(day.ganIndex, d.getHours());
      const lunar = getLunar(d);

      const custom = {

            source: 'solarlunar'

      console.log('%c[干支自检 ' + (dateStr || 'now') + ']', 'color:#64748b',

    window.verifyGanzhi('2026-02-03');  // 期望：乙巳 己丑 戊申
    window.verifyGanzhi('2026-05-26');  // 期望：丙午 四月初十
    console.log('当前时间验证:', window.verifyGanzhi());
    console.log('提示：控制台输入 verifyGanzhi("YYYY-MM-DD") 随时测试（会同时显示 solarlunar 结果）');

    // ==================== 渲染函数 ====================
    function renderPillar(elementId, ganzhi, type, extraInfo = '') {

      // 时辰盘由独立 RAF (startShichenClock) 驱动
      } catch (e) {
        console.error('更新时钟出错:', e);
      }
    }

    // 复制当前四柱
    function copyCurrentGanzhi() {
      const now = new Date();
      const dayG = getDayGanzhi(now);
      const hourG = getHourGanzhi(dayG.ganIndex, now.getHours());
      const jieqiInfo = getCurrentJieqiAndMonth(now);
      const yearG = getYearGanzhi(jieqiInfo.ganzhiYear);
      
      const text = `四柱：${yearG.full} ${jieqiInfo.monthFull} ${dayG.full} ${hourG.full}（${now.toLocaleString('zh-CN')}）`;
      
      navigator.clipboard.writeText(text).then(() => {
        const originalText = event.currentTarget?.innerHTML || '';
        const btns = document.querySelectorAll('body');
        // 简单提示
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-emerald-400 px-4 py-2 rounded-2xl text-sm border border-slate-700';
        toast.innerHTML = `已复制：${text}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
      }).catch(() => {
        alert(text);
      });
    }

    // ==================== 初始化 ====================
    function init() {
      // Tailwind script 已在 head
      console.log('%c[干支时钟] v0.3 初始化完成（指针已删除，保留时刻盘）', 'color:#64748b');
      
      // 全新干支时辰钟表初始化（完全重做版）
      createShichenDial();
      
      // 首次渲染其他内容
      updateClock();
      
      // 每秒更新四柱、节气、农历等
      setInterval(updateClock, 1000);
      
      // 启动时辰时刻盘（RAF驱动，仅更新刻度高亮 + 中心文字）
      startShichenClock();
      
      // 键盘快捷键提示
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement.tagName === 'BODY') {
          e.preventDefault();
          // 未来可扩展搜索历史
        }
      });
    }

    // 主题切换
    function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      // 高亮当前按钮
      ['ink','wuxing','clean'].forEach(t => {
        const btn = document.getElementById('theme-' + t);
        if (btn) btn.classList.toggle('bg-slate-700', t === theme);
      });
      localStorage.setItem('ganzhi-theme', theme);
    }

    function loadTheme() {
      const saved = localStorage.getItem('ganzhi-theme') || 'ink';
      setTheme(saved);
    }

    // 历史查询 / 生日查询
    function queryHistory() {
      const input = document.getElementById('history-date');
      if (!input.value) return;
      const d = new Date(input.value + 'T12:00:00'); // 用中午避免时区问题

      // 优先使用 solarlunar 库（准确匹配用户权威八字数据）
      let displayYear, displayMonth, displayDay, lunarStr;
      const sl = window.solarLunar || (window.solarLunar && window.solarLunar.default);
      const hasSolarLunar = sl && typeof sl.solar2lunar === 'function';

      if (hasSolarLunar) {
        const r = sl.solar2lunar(d.getFullYear(), d.getMonth() + 1, d.getDate());
        displayYear = r.gzYear || '';
        displayMonth = r.gzMonth || '';
        displayDay = r.gzDay || '';
        lunarStr = `${r.lYear || r.year}年${r.monthCn || r.monthStr || ''}${r.dayCn || r.dayStr || ''}`;
      } else {
        // 回退到旧逻辑
        const dayG = getDayGanzhi(d);
        const jie = getCurrentJieqiAndMonth(d);
        const yG = getYearGanzhi(jie.ganzhiYear);
        displayYear = yG.full;
        displayMonth = jie.monthFull;
        displayDay = dayG.full;
        const lun = getLunar(d);
        lunarStr = lun.full;
      }

      const sheng = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
      const yearZhiIdx = (displayYear && displayYear[1]) ? ZHI.indexOf(displayYear[1]) : 0;
      const nayinYear = NAYIN[displayYear] || '';
      const shengStr = sheng[yearZhiIdx] || '';

      const html = `
        <div class="mt-2 text-amber-300 font-medium">${displayYear} ${displayMonth} ${displayDay}</div>
        <div class="text-xs text-slate-400">${lunarStr} · ${shengStr}年 ${nayinYear}</div>
        <div class="text-[10px] text-slate-500 mt-1">（使用 solarlunar 库校准）</div>
      `;
      document.getElementById('history-result').innerHTML = html;
    }

    function queryHistoryToday() {
      const today = new Date().toISOString().slice(0,10);
      document.getElementById('history-date').value = today;
      queryHistory();
    }

    function quickDate(dateStr) {
      document.getElementById('history-date').value = dateStr;
      queryHistory();
    }

    function setMyBirthday() {
      const d = prompt('请输入你的生日 (YYYY-MM-DD)，例如 1990-05-20：');
      if (d) {
        localStorage.setItem('ganzhi-birthday', d);
        alert('已保存！点击“我的生日”即可快速查询');
        updateBirthdayButton();
      }
    }

    function useBirthday() {
      const b = localStorage.getItem('ganzhi-birthday');
      if (b) {
        quickDate(b);
      } else {
        alert('请先点击“设置生日”保存你的出生日期');
      }
    }

    function updateBirthdayButton() {
      const btn = document.getElementById('btn-birthday');
      if (!btn) return;
      const b = localStorage.getItem('ganzhi-birthday');
      if (b) btn.textContent = '我的生日 (' + b + ')';
    }

    // ==================== 圆形干支表盘 (实时) ====================
    // 时刻盘：12地支 + 96刻度（每时辰8刻），当前时辰8刻高亮金色
    // 中心显示当前时辰名称 + 时间范围
    // 指针已按用户要求完全删除（保留刻度/标签/高亮/文字）

    let dialRAF = null;
    let lastShichen = -1;

    function createShichenDial() {
      const labelsG = document.getElementById('shichen-labels');
      if (!labelsG) return;
      labelsG.innerHTML = '';

      const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
      const cx = 160, cy = 160;
      const labelR = 108;

      branches.forEach((char, i) => {
        const baseAng = (i * 30 - 90);
        const angRad = baseAng * Math.PI / 180;
        const x = cx + Math.cos(angRad) * labelR;
        const y = cy + Math.sin(angRad) * labelR;

        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', x);
        t.setAttribute('y', y);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'middle');
        t.setAttribute('font-size', '18');
        t.setAttribute('font-weight', '700');
        t.setAttribute('fill', '#64748b');
        t.textContent = char;
        labelsG.appendChild(t);
      });
    }

    // 独立绘制时刻刻度环（96刻），当前时辰的8个刻度高亮
    function draw刻度ForShichen(currentIdx) {
      const ticksG = document.getElementById('刻度-ticks');
      if (!ticksG) return;
      ticksG.innerHTML = '';

      const cx = 160, cy = 160;
      const tickInnerR = 68;
      const tickOuterR = 80;   // 让手尖能明显落在刻度上

      for (let i = 0; i < 12; i++) {
        const baseAng = (i * 30 - 90);
        const isCurrent = (i === currentIdx);

        for (let k = 0; k < 8; k++) {
          const tickAng = baseAng + (k * 30 / 8);
          const tickRad = tickAng * Math.PI / 180;

          const x1 = cx + Math.cos(tickRad) * tickInnerR;
          const y1 = cy + Math.sin(tickRad) * tickInnerR;
          const x2 = cx + Math.cos(tickRad) * tickOuterR;
          const y2 = cy + Math.sin(tickRad) * tickOuterR;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', x1);
          line.setAttribute('y1', y1);
          line.setAttribute('x2', x2);
          line.setAttribute('y2', y2);
          if (isCurrent) {
            line.setAttribute('stroke', '#fcd34d');
            line.setAttribute('stroke-width', k === 0 ? '2.5' : '1.8');
          } else {
            line.setAttribute('stroke', '#475569');
            line.setAttribute('stroke-width', k === 0 ? '1.5' : '1');
          }
          ticksG.appendChild(line);
        }
      }
    }

    function highlightShichen(index) {
      const g = document.getElementById('shichen-labels');
      if (!g) return;
      Array.from(g.children).forEach((el, i) => {
        if (i === index) {
          el.setAttribute('fill', '#fcd34d');
          el.setAttribute('font-size', '21');
        } else {
          el.setAttribute('fill', '#64748b');
          el.setAttribute('font-size', '18');
        }
      });
    }

    function startShichenClock() {
      if (dialRAF) cancelAnimationFrame(dialRAF);

      function animate() {
        const now = new Date();

        // 当前时辰索引（唯一真相来源）
        const idx = getShichenIndex(now.getHours());

        // 只在时辰变化时更新高亮、刻度环和中心文字
        // 指针已删除，仅保留用户确认正确的刻度/标签/中心显示
        if (idx !== lastShichen) {
          highlightShichen(idx);
          draw刻度ForShichen(idx);   // 当前时辰的8个刻度高亮成金色

          const main = document.getElementById('dial-center-main');
          const sub = document.getElementById('dial-center-sub');
          if (main && sub) {
            main.textContent = ZHI[idx] + '时';
            const r = SHICHEN_RANGES[idx];
            sub.textContent = `${r.start}:00 - ${r.end}:00`.replace('24', '00');
          }
          lastShichen = idx;
        }

        dialRAF = requestAnimationFrame(animate);
      }
      animate();
    }

    // 旧的 updateDial 已彻底移除。
    // 当前驱动：startShichenClock + RAF（仅刻度高亮 + 中心文字更新）
    function updateDial(now) {
      // 已废弃（空实现）
    }

    // ==================== 启动
    window.onload = function() {
      loadTheme();
      init();
      updateBirthdayButton();
    };
  </script>
