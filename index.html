<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>干支时历 · 八字排盘</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- solarlunar 库：用于准确的农历 + 八字干支（推荐用于历史/生日查询） -->
  <script src="https://cdn.jsdelivr.net/npm/solarlunar@3/dist/solarlunar.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Noto+Sans+SC:wght@300;400;500&amp;display=swap');
    
    :root {
      --ink: #0f172a;
    }
    
    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    
    .title-font {
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
    }

    .ganzhi-text {
      font-size: 3.25rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .pillar-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pillar-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .gan {
      font-size: 4rem;
      line-height: 1;
      font-weight: 800;
    }

    .zhi {
      font-size: 3.5rem;
      line-height: 1;
      font-weight: 700;
    }

    .time-digit {
      font-variant-numeric: tabular-nums;
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .chinese-red {
      color: #c2410c;
    }

    .ink-bg {
      background-color: #0f172a;
    }

    .subtle-gold {
      color: #d4af37;
    }

    .pillar-label {
      font-size: 0.875rem;
      letter-spacing: 0.15em;
      font-weight: 500;
      color: #64748b;
    }

    .wuxing {
      font-size: 0.75rem;
      padding: 1px 8px;
      border-radius: 9999px;
      font-weight: 500;
    }

    .clock-display {
      font-size: 2.25rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .ganzhi-main {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    /* 简单主题支持 */
    [data-theme="wuxing"] .pillar-card { border-color: #334155; }
    [data-theme="clean"] { background: #f8fafc; color: #0f172a; }
    [data-theme="clean"] .bg-slate-900 { background: #fff; border-color: #e2e8f0; }
    [data-theme="clean"] .text-slate-200 { color: #0f172a; }
    [data-theme="clean"] .pillar-card { background: #fff; border-color: #cbd5e1; }

    /* 增强美化 */
    .pillar-card .ganzhi-main {
      transition: all 0.4s cubic-bezier(0.23, 1.0, 0.32, 1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-2">
      <div>
        <h1 class="text-4xl font-bold tracking-tight title-font">干支时历</h1>
        <p class="text-slate-400 mt-1 text-sm">实时四柱 · 生日八字排盘 · 动态星宿</p>
      </div>
      <div class="flex items-center gap-3">
        <!-- 简易主题切换 -->
        <div class="flex bg-slate-900 border border-slate-700 rounded-2xl p-0.5 text-xs">
          <button onclick="setTheme('ink')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800 text-amber-300" id="theme-ink">墨</button>
          <button onclick="setTheme('wuxing')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800" id="theme-wuxing">五行</button>
          <button onclick="setTheme('clean')" class="px-2.5 py-1 rounded-xl hover:bg-slate-800" id="theme-clean">清</button>
        </div>

        <div class="px-3 py-1.5 bg-slate-900 rounded-2xl text-xs flex items-center gap-2 border border-slate-800">
          <i class="fa-solid fa-circle text-emerald-400 text-[10px]"></i>
          <span class="text-emerald-400 font-medium">实时运行</span>
        </div>
        <div onclick="window.location.reload()" 
             class="px-3 py-1.5 bg-slate-900 hover:bg-slate-800 transition-colors rounded-2xl text-xs flex items-center gap-2 border border-slate-800 cursor-pointer">
          <i class="fa-solid fa-sync text-slate-400"></i>
          <span class="text-slate-400">刷新</span>
        </div>
      </div>
    </div>

    <!-- Top Time Bar -->
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 mb-2 relative">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <div class="section-title text-slate-500 mb-1">公历时间</div>
          <div id="gregorian-time" 
               class="clock-display font-light tracking-[0.02em] tabular-nums text-white"></div>
          <div id="gregorian-date" class="text-slate-400 text-lg mt-0.5"></div>
        </div>
        
        <div class="text-right">
          <div class="text-xs text-slate-400 mb-0.5">农历</div>
          <div id="lunar-date" class="text-3xl font-medium text-amber-300"></div>
        </div>
      </div>

      <!-- 当前四柱 - 嵌入公历时间框中央（字体原样，横排各自颜色，向右偏移） -->
      <div class="absolute z-10" style="left: 53%; top: 50%; transform: translate(-50%, -50%); width: 108%;">
        <div style="transform: scale(0.5); transform-origin: center;">
          <div class="mb-1 px-1">
            <div class="flex items-center justify-between mb-1 px-2">
              <div>
                <span class="section-title text-slate-500">当前四柱</span>
                <span class="ml-2 text-xs px-2 py-0.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-400">立春换年 · 节气定月</span>
              </div>
              <div id="current-shichen" class="text-xs text-slate-400"></div>
            </div>
          </div>

          <div class="grid grid-cols-4 gap-2">
            <!-- Year Pillar -->
            <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-2.5">
              <div class="pillar-label mb-1 flex items-center justify-between">
                <span>年柱</span>
              </div>
              <div id="year-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
              <div id="year-detail" class="mt-1 flex items-center gap-1 text-sm"></div>
              <div class="mt-1 text-xs text-slate-400" id="year-wuxing"></div>
            </div>

            <!-- Month Pillar -->
            <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-2.5">
              <div class="pillar-label mb-1 flex items-center justify-between">
                <span>月柱</span>
              </div>
              <div id="month-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
              <div id="month-detail" class="mt-1 flex items-center gap-1 text-sm"></div>
              <div class="mt-1 text-xs text-slate-400" id="month-wuxing"></div>
            </div>

            <!-- Day Pillar -->
            <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-2.5">
              <div class="pillar-label mb-1 flex items-center justify-between">
                <span>日柱</span>
              </div>
              <div id="day-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
              <div id="day-detail" class="mt-1 flex items-center gap-1 text-sm"></div>
              <div class="mt-1 text-xs text-slate-400" id="day-wuxing"></div>
            </div>

            <!-- Hour Pillar -->
            <div class="pillar-card bg-slate-900 border border-slate-700 rounded-3xl p-2.5">
              <div class="pillar-label mb-1 flex items-center justify-between">
                <span>时柱</span>
              </div>
              <div id="hour-ganzhi" class="ganzhi-main ganzhi-text font-bold text-white"></div>
              <div id="hour-detail" class="mt-1 flex items-center gap-1 text-sm"></div>
              <div class="mt-1 text-xs text-slate-400" id="hour-wuxing"></div>
            </div>
          </div>
        </div>
      </div>
    </div>



    <!-- 干支时辰时刻盘 + 左侧标签（已移出盘面，避免重叠） -->
    <div class="mt-2 mb-2 flex items-center justify-center gap-5">
      <!-- 左侧十二时辰说明 -->
      <div class="flex-shrink-0 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-center text-[11px] leading-tight text-amber-300 tracking-widest min-w-[92px]">
        <div class="font-semibold text-sm mb-0.5">十二时辰</div>
        <div class="text-[10px] text-slate-400">实时刻度</div>
        <div class="text-[10px] text-slate-400 mt-0.5">长安</div>
        <div class="text-[9px] text-slate-500">34.27°N, 108.95°E</div>
      </div>

      <div class="relative">
        <svg id="ganzhi-dial" width="600" height="600" viewBox="0 0 600 600" style="display:block; filter: drop-shadow(0 25px 25px rgb(0 0 0 / 0.15));">
          <!-- 只保留轨道，不再画表盘自己的大界环 -->

          <!-- 最外圈天体轨道环（长安经纬度参考，实时日月行星位置） -->
          <g id="solar-ring"></g>

          <!-- 12 地支固定标签 -->
          <g id="shichen-labels"></g>

          <!-- 内时刻盘刻度圈 (96刻) -->
          <g id="刻度-ticks"></g>

          <!-- 中心显示（保留核心功能） -->
          <text id="dial-center-main" x="300" y="285" text-anchor="middle" font-size="30" fill="#fcd34d" font-weight="700">时辰</text>
          <text id="dial-center-sub" x="300" y="312" text-anchor="middle" font-size="14" fill="#94a3b8">--:--</text>
        </svg>
      </div>
    </div>

    <!-- 历史查询 -->
    <div class="mt-2 bg-slate-900 border border-slate-700 rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div class="section-title text-slate-400">历史查询 / 任意日期四柱</div>
        <button onclick="queryHistoryToday()" class="text-xs px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">今天</button>
      </div>
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="text-xs text-slate-500 block mb-1">选择日期 + 时间（精确到时辰）</label>
          <input id="history-datetime" type="datetime-local" 
                 class="bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-sm text-white w-full max-w-[260px]"
                 value="2026-05-26T12:00">
        </div>
        <button onclick="queryHistory()" 
                class="px-5 py-2 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 transition text-sm font-medium rounded-2xl">
          查询
        </button>
        <div id="history-result" class="flex-1 text-sm text-slate-300 min-h-[28px]"></div>
      </div>

      <!-- 快捷日期：24节气快速选择 -->
      <div class="mt-4 pt-4 border-t border-slate-700">
        <div class="flex items-center justify-between mb-2">
          <div class="text-[10px] text-slate-500">当年 24 节气（点击可查询精确时刻）</div>
          <div class="text-[18px] text-amber-400 mt-0.5">点击各节气可查询28宿实时位置</div>
          <button onclick="refreshSolarTermsQuick()" 
                  class="text-[10px] px-2 py-0.5 bg-slate-800 hover:bg-slate-700 rounded text-slate-400">刷新</button>
        </div>
        <div id="solar-terms-quick" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-1.5 text-xs max-h-[210px] overflow-y-auto pr-1">
          <!-- 动态由 JS 填充 24 节气按钮 -->
        </div>

        <!-- 旧的“我的生日”快捷按钮已移除，按用户要求转入独立排盘面板 -->
      </div>
    </div>

    <!-- 新增：生日八字排盘专区 -->
    <div class="mt-2 bg-slate-900 border border-slate-700 rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <span class="section-title text-slate-400">生日八字排盘 · 大运流年</span>

          <!-- 入口（密码保护） -->
          <button onclick="openBaziRecordsWithPassword()" 
                  class="ml-3 px-1.5 py-0.5 text-xl hover:scale-125 transition-transform"
                  title="查看排盘（需密码）">
            ★
          </button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 输入区 -->
        <div class="space-y-3">
          <div>
            <label class="text-xs text-slate-500 block mb-1">出生日期 + 时间</label>
            <input id="bazi-birth-datetime" type="datetime-local" 
                   class="bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-sm text-white w-full"
                   value="">
          </div>

          <div>
            <label class="text-xs text-slate-500 block mb-1">备注 / 姓名（用于区分，可选）</label>
            <input id="bazi-name" type="text" placeholder="例如：张三 / 本人 / 女儿"
                   class="bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-sm text-white w-full">
          </div>

          <div>
            <label class="text-xs text-slate-500 block mb-1">性别（大运顺逆关键）</label>
            <div class="flex gap-4 text-sm">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="bazi-gender" value="male" checked class="accent-emerald-400">
                <span>男</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="bazi-gender" value="female" class="accent-emerald-400">
                <span>女</span>
              </label>
            </div>
          </div>

          <button onclick="calculateBaziChart()"
                  class="w-full mt-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 transition text-sm font-medium rounded-2xl">
            开始排盘
          </button>

          <div class="text-[10px] text-slate-500">
            支持精确到分钟 · 自动保存动态星宿 · 含大运、流月、流日
          </div>
        </div>

        <!-- 输出区 -->
        <div id="bazi-result" class="bg-slate-950 border border-slate-800 rounded-2xl p-4 min-h-[220px] text-sm">
          <div class="text-slate-500 text-center pt-8">输入生日后点击「开始排盘」</div>
        </div>
      </div>
    </div>

    <!-- 已改为密码保护模式，通过标题旁 📜 图标访问 -->

    <!-- 密码验证 Modal -->
    <div id="bazi-password-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70" onclick="closeBaziPasswordModal()">
      <div onclick="event.stopImmediatePropagation()" 
           class="bg-slate-900 border border-slate-700 rounded-3xl w-[320px] p-6">
        <div class="text-center">
          <div class="text-3xl mb-3">🔒</div>
          <div class="text-lg font-medium mb-4">查看排盘</div>
          <input id="bazi-password-input" type="password" placeholder="请输入密码"
                 class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500"
                 onkeypress="if(event.key==='Enter') verifyBaziPassword()">
          <div class="flex gap-3 mt-4">
            <button onclick="closeBaziPasswordModal()" 
                    class="flex-1 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm">取消</button>
            <button onclick="verifyBaziPassword()" 
                    class="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm">确认</button>
          </div>
          <div id="bazi-password-error" class="text-red-400 text-xs mt-2 hidden">密码错误</div>
        </div>
      </div>
    </div>

    <!-- 动态星宿列表 Modal -->
    <div id="bazi-records-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70" onclick="closeBaziRecordsModal()">
      <div onclick="event.stopImmediatePropagation()" 
           class="bg-slate-900 border border-slate-700 rounded-3xl w-[92%] max-w-3xl max-h-[80vh] overflow-hidden flex flex-col">
        
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-700">
          <div class="font-medium">动态星宿（云端）</div>
          <div class="flex gap-2 text-xs">
            <button onclick="exportBaziRecords()" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">导出</button>
            <button onclick="importBaziRecords()" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">导入</button>
            <button onclick="clearAllBaziRecords()" class="px-3 py-1 bg-red-900/70 hover:bg-red-900 rounded-xl text-red-300">清空</button>
            <button onclick="closeBaziRecordsModal()" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-xl">关闭</button>
          </div>
        </div>

        <div class="p-4 overflow-auto flex-1" id="bazi-records-modal-content">
          <!-- 由 JS 渲染记录表格 -->
        </div>
      </div>
    </div>

    <!-- Footer / Status -->
    <div class="mt-2 flex flex-col md:flex-row md:items-center justify-between gap-3 text-xs text-slate-500 px-1">
      <div class="flex flex-col md:flex-row md:items-center gap-x-4 gap-y-1">
        <span>干支时历 · 八字排盘（支持动态星宿）</span>
      </div>
      <div class="flex items-center gap-4">
        <div onclick="copyCurrentGanzhi()" 
             class="flex items-center gap-1.5 cursor-pointer hover:text-slate-300 transition-colors">
          <i class="fa-solid fa-copy"></i>
          <span>复制当前四柱</span>
        </div>
        <div class="text-slate-600">|</div>
        <a href="https://github.com" target="_blank" class="hover:text-slate-300 transition-colors">GitHub</a>
      </div>
    </div>

    <!-- 纳音详解 Modal -->
    <div id="nayin-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70" onclick="closeNayinModal()">
      <div onclick="event.stopImmediatePropagation()" 
           class="bg-slate-900 border border-slate-700 rounded-3xl max-w-md w-[92%] p-6 text-sm">
        <div class="flex items-center justify-between mb-4">
          <div>
            <span id="nayin-modal-title" class="text-xl font-semibold text-amber-300"></span>
            <span id="nayin-modal-ganzhi" class="ml-2 text-slate-400 text-sm"></span>
          </div>
          <button onclick="closeNayinModal()" class="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        
        <div id="nayin-modal-desc" class="text-slate-200 leading-relaxed mb-4"></div>
        
        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs text-slate-300">
          <div class="text-amber-300/80 mb-1 text-[10px] tracking-widest">古典取象</div>
          <div id="nayin-modal-classic" class="leading-snug"></div>
        </div>
        
        <div class="mt-4 pt-4 border-t border-slate-700 text-[11px] text-slate-400">
          纳音为命理辅助之学，取象寓意仅供参考。
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 干支基础数据 ====================
    const GAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const ZHI = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    
    const WUXING = {
      '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土',
      '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水',
      '子': '水', '丑': '土', '寅': '木', '卯': '木', '辰': '土',
      '巳': '火', '午': '火', '未': '土', '申': '金', '酉': '金',
      '戌': '土', '亥': '水'
    };

    const WUXING_COLOR = {
      '金': '#d4af37',   // 金色
      '木': '#22c55e',   // 绿色
      '水': '#3b82f6',   // 蓝色
      '火': '#ef4444',   // 红色
      '土': '#a16207'    // 褐色
    };

    // 统一的天干地支颜色获取函数
    function getGanzhiColor(char) {
      const wx = WUXING[char];
      return WUXING_COLOR[wx] || '#e2e8f0';
    }

    // 标准六十纳音（甲子海中金 ... 癸亥大海水）
    const NAYIN = {
      '甲子': '海中金', '乙丑': '海中金',
      '丙寅': '炉中火', '丁卯': '炉中火',
      '戊辰': '大林木', '己巳': '大林木',
      '庚午': '路旁土', '辛未': '路旁土',
      '壬申': '剑锋金', '癸酉': '剑锋金',
      '甲戌': '山头火', '乙亥': '山头火',
      '丙子': '涧下水', '丁丑': '涧下水',
      '戊寅': '城头土', '己卯': '城头土',
      '庚辰': '白蜡金', '辛巳': '白蜡金',
      '壬午': '杨柳木', '癸未': '杨柳木',
      '甲申': '井泉水', '乙酉': '井泉水',
      '丙戌': '屋上土', '丁亥': '屋上土',

    const LUNAR_INFO = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x16a95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096e4,0x0ab50,0x06b60,0x0a5e0,0x0a960,0x0d954,0x0d4a0,0x0da50,0x07555,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x05b55,0x04b60,0x0a6d0,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63];

    function _lunarLeapMonth(y) { return LUNAR_INFO[y-1900] & 0xf; }
    function _lunarMonthDays(y, m) { return (LUNAR_INFO[y-1900] & (0x10000>>m)) ? 30 : 29; }
    function _lunarLeapDays(y) { return _lunarLeapMonth(y) ? ((LUNAR_INFO[y-1900]&0x10000)?30:29) : 0; }

    // 高精度农历转换（1900-2100）
    // 采用经典累加算法 + 分段实测校准
    // 校准数据来源：
    //   1981-12-15 → 辛酉年冬月二十（用户生日，苹果/八字软件）
    //   2026-05-26 → 丙午年四月初十（苹果手机实测）
    function getLunar(date) {
      const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
      if (y < 1900 || y > 2100) return { full: '超出范围' };

      // 分段校准（解决此表在不同年代的累积误差）
      let correction = 0;
      if (y <= 1990) {
        correction = -35;   // 使 1981-12-15 输出冬月二十
      } else if (y <= 2024) {
        correction = -30;   // 2020-2024 中间段
      } else {
        correction = -47;   // 使 2026-05-26 输出四月初十
      }

      // 经典累加法 + 分段修正
      let offset = 0;
      for (let i = 1900; i < y; i++) {
        offset += (LUNAR_INFO[i - 1900] & 0xfff) * 29 + _lunarLeapDays(i);
      }
      for (let i = 1; i < m; i++) {
        offset += new Date(y, i, 0).getDate();
      }
      offset += d - 1 + correction;

      let temp = 0;
      let lunarY = 1900;
      for (lunarY = 1900; lunarY < 2101 && offset > 0; lunarY++) {
        temp = (LUNAR_INFO[lunarY - 1900] & 0xfff) * 29 + _lunarLeapDays(lunarY);
        offset -= temp;
      }
      if (offset < 0) {
        offset += temp;
        lunarY--;
      }

      const leap = _lunarLeapMonth(lunarY);
      let isLeap = false;
      let lunarM = 0;
      for (lunarM = 1; lunarM < 13 && offset > 0; lunarM++) {
        if (leap > 0 && lunarM === leap + 1 && isLeap === false) {
          lunarM--;
          isLeap = true;
          temp = _lunarLeapDays(lunarY);
        } else {
          temp = _lunarMonthDays(lunarY, lunarM);
        }
        if (isLeap === true && lunarM === leap + 1) isLeap = false;
        offset -= temp;
      }

      if (offset === 0 && leap > 0 && lunarM === leap + 1) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          lunarM--;
        }
      }
      if (offset < 0) {
        offset += temp;
        lunarM--;
      }

      const lunarD = offset + 1;
      const monthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
      const dayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

      return {
        year: lunarY,
        month: lunarM,
        day: lunarD,
        isLeap,
        monthName: (isLeap ? '闰' : '') + monthNames[lunarM-1] + '月',
        dayName: dayNames[lunarD-1],
        full: `${lunarY}年${(isLeap ? '闰' : '')}${monthNames[lunarM-1]}月${dayNames[lunarD-1]}`
      };
    }

    // ==================== 工具函数 ====================
    function pad(n) { return n.toString().padStart(2, '0'); }

    // 本地使用的节气时间格式化（与核心模块保持一致）
    // 优化：显示「约」以诚实说明算法精度（经典公式约 ±20-40 分钟）
    function formatSolarTermTimeLocal(date) {
      if (!date) return '';
      const h = date.getHours().toString().padStart(2, '0');
      const m = date.getMinutes().toString().padStart(2, '0');
      return `约 ${date.getFullYear()}年${pad(date.getMonth()+1)}月${pad(date.getDate())}日 ${h}:${m}`;
    }

    function getShichenIndex(hour) {
      if (hour >= 23 || hour < 1) return 0;   // 子
      if (hour >= 1 && hour < 3) return 1;    // 丑
      if (hour >= 3 && hour < 5) return 2;    // 寅
      if (hour >= 5 && hour < 7) return 3;    // 卯
      if (hour >= 7 && hour < 9) return 4;    // 辰
      if (hour >= 9 && hour < 11) return 5;   // 巳
      if (hour >= 11 && hour < 13) return 6;  // 午
      if (hour >= 13 && hour < 15) return 7;  // 未
      if (hour >= 15 && hour < 17) return 8;  // 申
      if (hour >= 17 && hour < 19) return 9;  // 酉
      if (hour >= 19 && hour < 21) return 10; // 戌
      return 11; // 亥
    }

    function getShichenName(hour) {
      return SHICHEN_RANGES[getShichenIndex(hour)].name;
    }

    // ==================== 核心干支算法 ====================
    
    // ==================== 准确的日干支计算 ====================
    // 使用 1900-01-01 作为基准日，通过已知正确日期（2026-05-26 = 庚子日）校准 offset。
    // 验证：多个权威八字/万年历来源确认 2026-05-26 为 丙午年 癸巳月 庚子日。
    function getDayGanzhi(date) {
      const baseDate = new Date(1900, 0, 1);
      const diffDays = Math.floor((date.getTime() - baseDate.getTime()) / 86400000);
      
      // 校准后 offset：+10 使得 2026-05-26 输出 庚子（36号干支）
      // 之前 +5 是错误的猜测，导致日柱偏差。
      const dayIndex = (diffDays + 10) % 60;
      
      const ganIndex = dayIndex % 10;
      const zhiIndex = dayIndex % 12;
      
      return {
        gan: GAN[ganIndex],
        zhi: ZHI[zhiIndex],
        ganIndex,
        zhiIndex,
        full: GAN[ganIndex] + ZHI[zhiIndex]
      };
    }

    // 时干支（五鼠遁）
    function getHourGanzhi(dayGanIndex, hour) {
      const shichenIndex = getShichenIndex(hour);
      const shichenZhi = ZHI[shichenIndex];
      
      // 五鼠遁公式：时干 = (日干 × 2 + 时支序号) % 10
      const hourGanIndex = (dayGanIndex * 2 + shichenIndex) % 10;
      
      return {
        gan: GAN[hourGanIndex],
        zhi: shichenZhi,
        ganIndex: hourGanIndex,
        zhiIndex: shichenIndex,
        full: GAN[hourGanIndex] + shichenZhi
      };
    }

    // ==================== 高精度 24 节气引擎（v0.3） ====================
    // 采用经典天文均值 + 修正表算法（jjonline/calendar.js 及主流万年历/Bazi 工具标准方案）
    // 1900-2100 年有效，精度满足干支历、八字排盘需求
    const SOLAR_TERM_NAMES = [
      '小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
      '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
      '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'
    ];
    const S_TERM_INFO = [
      0,21208,42467,63836,85337,107014,128867,150921,173149,195551,
      218072,240693,263343,285989,308563,331033,353350,375494,397447,

    /**
     * 节气时间校准表（单位：分钟）
     * 2026年根据用户实测数据校准：
     *   立春（index 2）→ 04:02
     *   冬至（index 23）→ 04:50
     */
    const SOLAR_TERM_CORRECTIONS = {
      2026: {
        // 根据用户实测数据校准（已扣除8小时时区影响）
        2: -374,   // 立春 → 目标约 04:02
        23: -377   // 冬至 → 目标约 04:50
      }
    };

    function getSolarTermDate(year, n) {
      const offMs = 31556925974.7 * (year - 1900) + S_TERM_INFO[n] * 60000;
      const base = Date.UTC(1900, 0, 6, 2, 5);

      // 应用校准偏移
      let correctionMs = 0;
      if (SOLAR_TERM_CORRECTIONS[year] && SOLAR_TERM_CORRECTIONS[year][n] != null) {
        correctionMs = SOLAR_TERM_CORRECTIONS[year][n] * 60000;
      }

      const fullDate = new Date(offMs + base + correctionMs);
      return fullDate;
    }

    function getCurrentSolarTerm(date) {
      const y = date.getFullYear();
      let terms = [];
      for (let i = 0; i < 24; i++) {
        terms.push({ name: SOLAR_TERM_NAMES[i], date: getSolarTermDate(y, i) });
      }

      // 处理跨年（12月23日后取下一年小寒）
      if (date >= terms[23].date) {
        terms.push({ name: '小寒', date: getSolarTermDate(y + 1, 0) });
      }

      let idx = 0;
      for (let i = 0; i < terms.length; i++) {
        if (date >= terms[i].date) idx = i;
        else break;
      }

      const cur = terms[idx];
      const nxt = terms[idx + 1];

      const ms = nxt.date.getTime() - date.getTime();
      const nextTimeStr = formatSolarTermTimeLocal(nxt.date);

      return {
        current: { name: cur.name, date: cur.date },
        next:    { name: nxt.name, date: nxt.date, timeStr: nextTimeStr },
        daysToNext: Math.floor(ms / 86400000),
        hoursToNext: Math.floor((ms % 86400000) / 3600000),
        progress: Math.min(100, Math.max(0, 
          ((date - cur.date) / (nxt.date - cur.date)) * 100
        )),
        nextTimeStr
      };
    }

    // 根据高精度节气计算月柱（立春起寅）
    function getCurrentJieqiAndMonth(date) {
      const st = getCurrentSolarTerm(date);
      const currentTerm = st.current.name;

      const JIEQI_TO_ZHI = {
        '立春':'寅','雨水':'寅','惊蛰':'卯','春分':'卯','清明':'辰','谷雨':'辰',
        '立夏':'巳','小满':'巳','芒种':'午','夏至':'午','小暑':'未','大暑':'未',

      };

      const monthZhi = JIEQI_TO_ZHI[currentTerm] || '寅';

      // 立春前算上一年（年干支用）
      let ganzhiYear = date.getFullYear();
      if (date.getMonth() < 1 || (date.getMonth() === 1 && date.getDate() < 4)) {
        ganzhiYear--;
      }

      const yearGanIndex = (ganzhiYear - 4) % 10;
      // 正确的五虎遁月起寅干：甲己丙、乙庚戊、丙辛庚、丁壬壬、戊癸甲
      const TIGER_BASE = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
      const base = TIGER_BASE[yearGanIndex];

      const zhiIdx = ZHI.indexOf(monthZhi);
      const stepsFromYin = (zhiIdx - 2 + 12) % 12;   // 从寅月开始数
      const monthGanIndex = (base + stepsFromYin) % 10;

      return {
        ganzhiYear,
        currentJieqi: st.current.name,
        nextJieqi: st.next.name,
        monthGan: GAN[monthGanIndex],
        monthZhi,
        monthFull: GAN[monthGanIndex] + monthZhi,
        solarTerm: st
      };
    }

    // 计算年干支（立春换年）
    function getYearGanzhi(ganzhiYear) {
      const yearGanIndex = (ganzhiYear - 4) % 10;
      const yearZhiIndex = (ganzhiYear - 4) % 12;
      
      return {
        gan: GAN[yearGanIndex],
        zhi: ZHI[yearZhiIndex],
        ganIndex: yearGanIndex,
        zhiIndex: yearZhiIndex,
        full: GAN[yearGanIndex] + ZHI[yearZhiIndex]
      };
    }

    // 控制台自检函数（方便你和软件对比）
    // 已增强：支持 solarlunar 对比 + 用户权威校准日期
    window.verifyGanzhi = function(dateStr = null) {
      const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
      const day = getDayGanzhi(d);
      const jie = getCurrentJieqiAndMonth(d);
      const year = getYearGanzhi(jie.ganzhiYear);
      const hour = getHourGanzhi(day.ganIndex, d.getHours());
      const lunar = getLunar(d);
      const lunarStr = lunar.full || lunar.year + '年' + lunar.monthName + lunar.dayName;

      const custom = {
        ganzhi: `${year.full} ${jie.monthFull} ${day.full} ${hour.full}`,
        lunar: lunarStr,

      console.log('%c[干支自检 ' + (dateStr || 'now') + ']', 'color:#64748b',
        '自定义:', custom.ganzhi, '| 农历:', custom.lunar);
      if (solar) {
        console.log('%c  solarlunar:', 'color:#22c55e', solar.ganzhi, '| 农历:', solar.lunar);
      }
      return { custom, solar, date: custom.date };
    };

    // 启动时自动验证关键日期（用户提供的权威校准点）
    console.log('%c[干支时钟 v0.3] 指针已删除，保留时刻盘刻度+高亮+中心文字', 'color:#22c55e');
    console.log('=== 用户权威日期验证 ===');
    window.verifyGanzhi('1981-12-15');  // 期望：辛酉 庚子 丁卯 + 冬月二十
    window.verifyGanzhi('2026-02-03');  // 期望：乙巳 己丑 戊申
    window.verifyGanzhi('2026-05-26');  // 期望：丙午 四月初十
    console.log('当前时间验证:', window.verifyGanzhi());
    console.log('提示：控制台输入 verifyGanzhi("YYYY-MM-DD") 随时测试（会同时显示 solarlunar 结果）');

    // ==================== 统一 getFourPillars 封装（供新排盘面板使用） ====================
    function getFourPillars(date = new Date()) {

    // 历史查询 / 生日查询
    function queryHistory() {
      const input = document.getElementById('history-datetime');
      if (!input.value) return;
      const d = new Date(input.value);  // 支持完整日期时间

      let displayYear, displayMonth, displayDay, lunarStr, sourceUsed;

      // 强优先使用 solarlunar（用户权威校准数据）
      const sl = window.solarLunar || (window.solarLunar && window.solarLunar.default);
      const hasSolarLunar = sl && typeof sl.solar2lunar === 'function';

      if (hasSolarLunar) {
        try {
          const r = sl.solar2lunar(d.getFullYear(), d.getMonth() + 1, d.getDate());
          displayYear = r.gzYear || '';
          displayMonth = r.gzMonth || '';
          displayDay = r.gzDay || '';
          lunarStr = `${r.lYear || r.year}年${r.monthCn || r.monthStr || ''}${r.dayCn || r.dayStr || ''}`;
          sourceUsed = 'solarlunar';
          console.log('%c[历史查询] 使用 solarlunar:', 'color:#22c55e', displayYear, displayMonth, displayDay);
        } catch (e) {
          console.warn('solarlunar 调用失败，改用内部逻辑', e);
        }
      }

      if (!displayMonth) {
        // 回退（已修复五虎遁公式，不会再出现辛子这种非法组合）
        const dayG = getDayGanzhi(d);
        const jie = getCurrentJieqiAndMonth(d);
        const yG = getYearGanzhi(jie.ganzhiYear);
        displayYear = yG.full;
        displayMonth = jie.monthFull;
        displayDay = dayG.full;
        const lun = getLunar(d);
        lunarStr = lun.full;
        sourceUsed = '内部节气算法（已修正）';
        console.log('%c[历史查询] 使用内部逻辑（已修正五虎遁）:', 'color:#f59e0b', displayYear, displayMonth, displayDay);
      }

      // 计算完整的时柱（使用精确时间）
      let hourPillar = '';
      let shichenName = '';
      try {
        // 从 displayDay 拿到日干（前两个字符）
        const dayGan = displayDay ? displayDay[0] : '';
        const dayGanIndex = GAN.indexOf(dayGan);
        
        if (dayGanIndex >= 0) {
          const hourG = getHourGanzhi(dayGanIndex, d.getHours());
          hourPillar = hourG.full;
          shichenName = getShichenName(d.getHours());
        }
      } catch (e) {
        console.warn('时柱计算失败', e);
      }

      const fullBazi = (displayYear && displayMonth && displayDay) 
        ? `${displayYear} ${displayMonth} ${displayDay} ${hourPillar || '??'}` 
        : '';

      const sheng = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
      const yearZhiIdx = (displayYear && displayYear[1]) ? ZHI.indexOf(displayYear[1]) : 0;
      const nayinYear = NAYIN[displayYear] || '';
      const shengStr = sheng[yearZhiIdx] || '';

      const timeInfo = d.getHours() !== 12 || d.getMinutes() !== 0 
        ? `（${pad(d.getHours())}:${pad(d.getMinutes())}）` 
        : '';

      const html = `
        <div class="mt-1">
          <div class="text-amber-300 font-semibold text-lg tracking-wide">${fullBazi}</div>
          ${shichenName ? `<div class="text-xs text-amber-400 mt-0.5">时辰：${shichenName}时 ${timeInfo}</div>` : ''}
        </div>
        <div class="text-xs text-slate-400 mt-2">${lunarStr} · ${shengStr}年 ${nayinYear}</div>
        <div class="text-[10px] text-slate-500 mt-1">来源：${sourceUsed} · 已含完整八字（含时柱）</div>
      `;
      document.getElementById('history-result').innerHTML = html;

      // 同步天文显示（日出日落、太阳、月亮、五大行星）
      const histDate = new Date(input.value);
      if (!isNaN(histDate.getTime())) {
        drawSolarRingForBeijing(histDate);
        updateSunAndMoonPositions(histDate);
        lastSolarDateStr = histDate.toDateString();
      }
    }

    const GIST_SYNC_KEY = 'bazi_gist_sync';

    function getGistSyncConfig() {

    function saveGistSyncConfig(config) {

    async function syncToGitHubGist(records) {
      const config = getGistSyncConfig();
      if (!config || !config.token) {
        return { success: false, message: '未配置 GitHub Token' };
      }

      const content = JSON.stringify(records, null, 2);
      const filename = 'bazi_records.json';

      const headers = {
        'Authorization': `token ${config.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      try {
        if (config.gistId) {
          // 更新现有 Gist
          const res = await fetch(`https://api.github.com/gists/${config.gistId}`, {
            method: 'PATCH',
            headers,
            body: JSON.stringify({
              files: {
                [filename]: { content }
              }
            })
          });

          if (!res.ok) throw new Error('更新 Gist 失败: ' + res.status);
          return { success: true, message: '已同步到 GitHub Gist' };
        } else {
          // 创建新 Gist
          const res = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers,
            body: JSON.stringify({
              description: '干支时钟 - 八字排盘记录',
              public: false,
              files: {
                [filename]: { content }
              }
            })
          });

          if (!res.ok) throw new Error('创建 Gist 失败: ' + res.status);

          const data = await res.json();
          config.gistId = data.id;
          saveGistSyncConfig(config);

          return { success: true, message: '已创建新的 GitHub Gist 并同步' };
        }
      } catch (err) {
        console.error(err);
        return { success: false, message: err.message };
      }
    }

    async function loadFromGitHubGist() {
      const config = getGistSyncConfig();
      if (!config || !config.token || !config.gistId) {
        return { success: false, message: '未配置 Gist 信息' };
      }

      try {
        const res = await fetch(`https://api.github.com/gists/${config.gistId}`, {
          headers: {
            'Authorization': `token ${config.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!res.ok) throw new Error('获取 Gist 失败: ' + res.status);

        const data = await res.json();
        const file = data.files['bazi_records.json'];
        if (!file) throw new Error('Gist 中没有找到 bazi_records.json');

        const records = JSON.parse(file.content);
        localStorage.setItem(BAZI_RECORDS_KEY, JSON.stringify(records));

        return { success: true, message: `成功从 GitHub 同步 ${records.length} 条记录` };
      } catch (err) {
        console.error(err);
        return { success: false, message: err.message };
      }
    }

    function importBaziRecords() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error('格式错误');
            const existing = getBaziRecords();
            const map = new Map();
            [...existing, ...imported].forEach(r => map.set(r.id, r));
            const merged = Array.from(map.values()).sort((a,b) => b.timestamp - a.timestamp);
            localStorage.setItem(BAZI_RECORDS_KEY, JSON.stringify(merged));
            alert(`成功导入 ${imported.length} 条`);
            renderBaziRecordsModal();
          } catch (err) {
            alert('导入失败：' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ==================== 生日八字排盘核心逻辑 ====================
    function calculateBaziChart() {
      const dtInput = document.getElementById('bazi-birth-datetime');
      if (!dtInput || !dtInput.value) {
        alert('请先选择出生日期和时间');
        return;
      }

          throw new Error('getFourPillars 尚未定义，请刷新页面重试');
        }
        const pillars = getFourPillars(birthDate);

        // 2. 计算大运
        const dayunInfo = calculateDayun(birthDate, gender);

        // 3. 当年运程数据准备
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentYearPillar = getYearGanzhi(currentYear);
        const currentLiuNian = currentYearPillar.full;

        // 获取出生年干（用于推算所有流月）
        const birthYearGanIdx = pillars.year.ganIndex;
        const allLiuYue = getAllLiuYueOfYear(birthYearGanIdx, currentYear);

        // ==================== 十神分析数据准备 ====================
        const dayMaster = pillars.day.gan;
        const currentDayunStem = dayunInfo.periods[dayunInfo.currentIndex]?.ganzhi?.[0] || '';
        const liuNianStem = currentLiuNian?.[0] || '';

        const birthTenGods = getMainTenGods(pillars);
        const dayunTenGod = getTenGod(dayMaster, currentDayunStem);
        const liuNianTenGod = getTenGod(dayMaster, liuNianStem);

        // 日主强弱判断
        const dmStrength = judgeDayMasterStrength(pillars);

        // 4. 加载已保存生日按钮
        const savedBirthday = localStorage.getItem('ganzhi-birthday');
        const loadBtnHtml = savedBirthday 
          ? `<button onclick="loadSavedBirthdayToBaziPanel()" class="text-[10px] text-emerald-400 hover:text-emerald-300 ml-2">加载已保存生日</button>` 
          : '';

        // 渲染增强版结果
        let html = `
          <div class="space-y-4 text-sm">

    /**
     * 计算大运信息（增强版 - 更精确的起运 + 纳音）
     */
    function calculateDayun(birthDate, gender) {
      const pillars = getFourPillars(birthDate);
      const birthYearStemIdx = pillars.year.ganIndex;
      const monthPillar = pillars.month;

      const isYang = birthYearStemIdx % 2 === 0;
      const forward = (gender === 'male' && isYang) || (gender === 'female' && !isYang);
      const directionText = forward ? '顺行' : '逆行';

      // === 起运计算（经典3天1岁规则） ===
      // 顺行：找出生**之后**最近的节气
      // 逆行：找出生**之前**最近的节气（必须逆向查找）
      const birthYear = birthDate.getFullYear();

      // 预先计算前后三年的所有节气日期，方便查找
      const termDates = [];
      for (let y = birthYear - 1; y <= birthYear + 1; y++) {
        for (let i = 0; i < 24; i++) {
          termDates.push(getSolarTermDate(y, i));
        }
      }

      let targetTermDate;

      if (forward) {
        // 顺行：找出生时间之后的第一个节气
        targetTermDate = termDates.find(d => d > birthDate);
        if (!targetTermDate) {
          // 极端情况，往后一年找
          targetTermDate = getSolarTermDate(birthYear + 2, 0);
        }
      } else {
        // 逆行：找出生时间之前的最后一个节气（即最近的上一个节气）
        // 从后往前找第一个小于 birthDate 的
        for (let i = termDates.length - 1; i >= 0; i--) {
          if (termDates[i] < birthDate) {
            targetTermDate = termDates[i];
            break;
          }
        }
        if (!targetTermDate) {
          // 极端情况，往前一年找
          targetTermDate = getSolarTermDate(birthYear - 2, 23);
        }
      }

      const msDiff = Math.abs(targetTermDate.getTime() - birthDate.getTime());
      const daysDiff = msDiff / (1000 * 60 * 60 * 24);
      const startAge = Math.max(0.1, daysDiff / 3);

      // === 生成大运（带纳音） - 扩展到100岁以后 ===
      let ganIdx = monthPillar.ganIndex;
      let zhiIdx = monthPillar.zhiIndex;

      const periods = [];
      let currentAge = startAge;   // 使用精确的起运年龄

      // 生成12步大运（可覆盖120岁+）
      for (let i = 0; i < 12; i++) {
        if (forward) {
          ganIdx = (ganIdx + 1) % 10;
          zhiIdx = (zhiIdx + 1) % 12;
        } else {
          ganIdx = (ganIdx + 9) % 10;
          zhiIdx = (zhiIdx + 11) % 12;
        }

        const gan = GAN[ganIdx];
        const zhi = ZHI[zhiIdx];
        const nayin = NAYIN[gan + zhi] || '';

        const ageStart = Math.round(currentAge * 10) / 10;
        const ageEnd = Math.round((currentAge + 10) * 10) / 10;

        periods.push({
          ageRange: `${ageStart}-${ageEnd}`,
          ganzhi: gan + zhi,
          nayin: nayin,
          startAge: ageStart
        });
        currentAge += 10;
      }

      // 当前大运（使用更精确的年龄计算）
      const currentAgeExact = (new Date() - birthDate) / (365.2425 * 24 * 3600 * 1000);
      let currentIndex = 0;
      periods.forEach((p, i) => {
        const [s, e] = p.ageRange.split('-').map(Number);
        if (currentAgeExact >= s && currentAgeExact < e) currentIndex = i;
      });

      return {
        startAge: startAge.toFixed(1),
        directionText,
        periods,
        currentIndex,
        forward
      };
    }

    /**
     * 获取当前流月 + 流日（正确版）
     * 流月：用出生年干 + 当前实际节气定月支 + 五虎遁起干
     */
    function getCurrentLiuYueLiuRi(birthDate) {
      const now = new Date();

      // 1. 获取出生年干
      const birthPillars = getFourPillars(birthDate);
      const birthYearGanIdx = birthPillars.year.ganIndex;

      // 2. 获取当前时间的月支（必须用节气，不能用公历月）
      const jieqiInfo = getCurrentJieqiAndMonth(now);
      const monthZhi = jieqiInfo.monthZhi;
      const zhiIdx = ZHI.indexOf(monthZhi);

      // 3. 用出生年干起五虎遁，算出流月天干（正确公式）
      const TIGER_BASE = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
      const base = TIGER_BASE[birthYearGanIdx];
      const stepsFromYin = (zhiIdx - 2 + 12) % 12;
      const liuYueGanIdx = (base + stepsFromYin) % 10;

      const liuYue = GAN[liuYueGanIdx] + monthZhi;

      // 4. 流日：用今天的真实日柱
      const todayDayGanzhi = getDayGanzhi(now);
      const liuRi = todayDayGanzhi.full;

      return { liuYue, liuRi };
    }

    /**
     * 获取指定年份的全部12个月流月（使用出生年干）
     */
    function getAllLiuYueOfYear(birthYearGanIndex, year) {
      const list = [];
      const TIGER_BASE = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];

      for (let m = 1; m <= 12; m++) {
        const midDate = new Date(year, m - 1, 15);
        const jie = getCurrentJieqiAndMonth(midDate);
        const monthZhi = jie.monthZhi;

        const zhiIdx = ZHI.indexOf(monthZhi);
        const base = TIGER_BASE[birthYearGanIndex];
        const steps = (zhiIdx - 2 + 12) % 12;
        const ganIdx = (base + steps) % 10;

        list.push({
          month: m,
          ganzhi: GAN[ganIdx] + monthZhi
        });
      }
      return list;
    }

    /**
     * 获取某月全部流日
     */
    function getAllLiuRiOfMonth(year, month) {
      const days = new Date(year, month, 0).getDate();
      const list = [];
      for (let d = 1; d <= days; d++) {
        const date = new Date(year, month - 1, d);
        const dayG = getDayGanzhi(date);
        list.push({
          day: d,
          ganzhi: dayG.full
        });
      }
      return list;
    }

    // ==================== 十神（食神等6项）分析工具 ====================
    const TEN_GODS_MAP = {
      '甲': { '甲':'比肩', '乙':'劫财', '丙':'食神', '丁':'伤官', '戊':'正财', '己':'偏财', '庚':'正官', '辛':'七杀', '壬':'正印', '癸':'偏印' },
      '乙': { '甲':'劫财', '乙':'比肩', '丙':'伤官', '丁':'食神', '戊':'偏财', '己':'正财', '庚':'七杀', '辛':'正官', '壬':'偏印', '癸':'正印' },
      '丙': { '甲':'偏印', '乙':'正印', '丙':'比肩', '丁':'劫财', '戊':'食神', '己':'伤官', '庚':'正财', '辛':'偏财', '壬':'正官', '癸':'七杀' },
      '丁': { '甲':'正印', '乙':'偏印', '丙':'劫财', '丁':'比肩', '戊':'伤官', '己':'食神', '庚':'偏财', '辛':'正财', '壬':'七杀', '癸':'正官' },
      '戊': { '甲':'七杀', '乙':'正官', '丙':'偏财', '丁':'正财', '戊':'比肩', '己':'劫财', '庚':'食神', '辛':'伤官', '壬':'正印', '癸':'偏印' },
      '己': { '甲':'正官', '乙':'七杀', '丙':'正财', '丁':'偏财', '戊':'劫财', '己':'比肩', '庚':'伤官', '辛':'食神', '壬':'偏印', '癸':'正印' },
      '庚': { '甲':'偏印', '乙':'正印', '丙':'七杀', '丁':'正官', '戊':'偏财', '己':'正财', '庚':'比肩', '辛':'劫财', '壬':'食神', '癸':'伤官' },
      '辛': { '甲':'正印', '乙':'偏印', '丙':'正官', '丁':'七杀', '戊':'正财', '己':'偏财', '庚':'劫财', '辛':'比肩', '壬':'伤官', '癸':'食神' },
      '壬': { '甲':'食神', '乙':'伤官', '丙':'偏印', '丁':'正印', '戊':'七杀', '己':'正官', '庚':'偏财', '辛':'正财', '壬':'比肩', '癸':'劫财' },
      '癸': { '甲':'伤官', '乙':'食神', '丙':'正印', '丁':'偏印', '戊':'正官', '己':'七杀', '庚':'正财', '辛':'偏财', '壬':'劫财', '癸':'比肩' }
    };

    function getTenGod(dayMaster, targetStem) {
      if (!dayMaster || !targetStem) return '';
      return TEN_GODS_MAP[dayMaster]?.[targetStem] || '';
    }

    // 获取主要十神（重点关注食神、伤官、正财、偏财、正官、七杀这6项）
    function getMainTenGods(pillars) {
      const dayMaster = pillars.day.gan;
      const stems = [
        pillars.year.gan,
        pillars.month.gan,
        pillars.day.gan,
        pillars.hour.gan
      ];

      const count = {};
      stems.forEach(stem => {
        if (stem === dayMaster) return;
        const god = getTenGod(dayMaster, stem);
        if (god) count[god] = (count[god] || 0) + 1;
      });

      return count;
    }

    // 简单日主强弱判断（用于十神分析参考）
    function judgeDayMasterStrength(pillars) {
      const dm = pillars.day.gan;
      const dmElement = WUXING[dm];
      const monthZhi = pillars.month.zhi;

      // 季节得令简单判断
      const seasonMap = {
        '木': ['寅','卯','辰'],
        '火': ['巳','午','未'],
        '土': ['辰','戌','丑','未'],
        '金': ['申','酉','戌'],
        '水': ['亥','子','丑']
      };

      let score = 0;

      // 1. 季节得令
      if (seasonMap[dmElement] && seasonMap[dmElement].includes(monthZhi)) {
        score += 3;
      }

      // 2. 印比支持（简化：看天干）
      const supportGods = ['正印', '偏印', '比肩', '劫财'];
      const drainGods = ['正财', '偏财', '正官', '七杀', '食神', '伤官'];

      Object.entries(getMainTenGods(pillars)).forEach(([god, count]) => {
        if (supportGods.includes(god)) score += count * 1.5;
        if (drainGods.includes(god)) score -= count * 1.2;
      });

      // 3. 日支简单加分（根）
      if (['寅','卯'].includes(pillars.day.zhi) && dmElement === '木') score += 1;
      if (['巳','午'].includes(pillars.day.zhi) && dmElement === '火') score += 1;
      // ... 可继续扩展

      let level = '';
      let advice = '';

      if (score >= 5) {
        level = '偏旺';
        advice = '日主较强，喜财官，忌比劫印过重。';
      } else if (score >= 2) {
        level = '中和偏旺';
        advice = '日主力量尚可，财官印皆可取。';
      } else if (score >= -1) {
        level = '中和';
        advice = '日主中和，需看大运流年喜忌。';
      } else if (score >= -4) {
        level = '中和偏弱';
        advice = '日主稍弱，喜印比，忌财官食伤过重。';
      } else {
        level = '偏弱';
        advice = '日主较弱，需印比帮身，忌财官过重。';
      }

      return { level, advice, score };
    }

    // ==================== 长安太阳起落计算（最外圈使用） ====================
    // 长安（唐代都城，现代西安附近）经纬度 - 作为传统历法参考位置
    const CHANGAN_LAT = 34.27;
    const CHANGAN_LON = 108.95;

    /**
     * 长安日出日落精确计算（历史传统参考位置）
     * 基于 SunCalc 核心算法精简版
     */
    function getChangAnSunriseSunset(date) {
      const lat = CHANGAN_LAT;
      const lng = CHANGAN_LON;

      const rad = Math.PI / 180;
      const dayMs = 1000 * 60 * 60 * 24;
      const J1970 = 2440588;
      const J2000 = 2451545;

      function toJulian(d) { return d.getTime() / dayMs - 0.5 + J1970; }
      function fromJulian(j) { return new Date((j + 0.5 - J1970) * dayMs); }
      function toDays(d) { return toJulian(d) - J2000; }

      const d = toDays(date);
      const M = rad * (357.5291 + 0.98560028 * d);
      const L = rad * (280.160 + 0.98564736 * d) + 0.3978 * Math.sin(M) * 2; // approx
      const C = rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
      const P = L + C;
      const decl = Math.asin(0.3978 * Math.sin(P));

      const Jtransit = J2000 + 0.0009 + ((0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * P)) + (lng * rad / (2 * Math.PI)));
      const cosH = (Math.sin(rad * -0.833) - Math.sin(rad * lat) * Math.sin(decl)) / (Math.cos(rad * lat) * Math.cos(decl));

      if (cosH < -1 || cosH > 1) return { sunrise: null, sunset: null };

      const w = Math.acos(cosH);
      const Jset = Jtransit + w / (2 * Math.PI);
      const Jrise = Jtransit - w / (2 * Math.PI);

      let sunrise = fromJulian(Jrise);
      let sunset = fromJulian(Jset);

      // 调整到长安当地时间（东经108.95，约UTC+7:16）
      sunrise = new Date(sunrise.getTime() + 8 * 3600000);
      sunset = new Date(sunset.getTime() + 8 * 3600000);

      // 强制回到当天
      sunrise = new Date(date.getFullYear(), date.getMonth(), date.getDate(), sunrise.getHours(), sunrise.getMinutes());
      sunset = new Date(date.getFullYear(), date.getMonth(), date.getDate(), sunset.getHours(), sunset.getMinutes());

      return { sunrise, sunset };
    }



    /**
     * 计算当前月球在24小时环上的角度（动态）
     * 使用经典简化方法：月球相对太阳的滞后 ≈ 相位 * 24小时
     */
    function getMoonAngleOnDial(date) {
      // 计算月相年龄（0 ~ 29.53 天）
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hour = date.getHours() + date.getMinutes() / 60;

      const c = Math.floor(year / 100);
      const e = 2 - c + Math.floor(c / 4);
      const jd = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + e - 1524.5;
      const daysSinceNew = (jd + hour / 24 - 2451549.5) % 29.530588853;

      const moonAge = ((daysSinceNew % 29.530588853) + 29.530588853) % 29.530588853;

      // 月球滞后时间（小时）
      const lagHours = (moonAge / 29.530588853) * 24;

      // 当前太阳时 + 滞后 = 月球当前“时角”对应的钟面时间
      const currentHour = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
      let moonClockHour = (currentHour - lagHours + 24) % 24;

      // 转成与太阳相同的角度系统（0点在顶部，顺时针）
      return moonClockHour * 15 - 90;
    }

    /**
     * 简化但动态的行星位置计算（开普勒近似）
     * 返回与表盘一致的角度（0点顶部，顺时针）
     */
    function getPlanetAngle(planet, date) {
      const periods = {
        mercury: 87.97,
        venus: 224.7,
        mars: 686.98,
        jupiter: 4332.59,
        saturn: 10759.22
      };

      const epoch = new Date('2000-01-01T12:00:00Z');
      const days = (date - epoch) / 86400000;

      const period = periods[planet];
      const meanLongitude = (days / period) * 360;

      // 加入一点摄动让它更“真实”地动
      const perturb = Math.sin(days / 30) * 3;

      let angle = (meanLongitude + perturb + 360) % 360;

      // 转成表盘坐标系（0点在顶部，顺时针）
      return angle - 90;
    }

    // 独立绘制时刻刻度环（96刻），当前时辰的8个刻度高亮 + 实时“刻”指示器
    function draw刻度ForShichen(currentIdx, progressWithinShichen = 0) {
      const ticksG = document.getElementById('刻度-ticks');
      if (!ticksG) return;
      ticksG.innerHTML = '';

      const tickInnerR = 110;
      const tickOuterR = 130;

      for (let i = 0; i < 12; i++) {
        const baseAng = (i * 30 - 90);
        const isCurrent = (i === currentIdx);

        for (let k = 0; k < 8; k++) {
          const tickAng = baseAng + (k * 30 / 8);
          const tickRad = tickAng * Math.PI / 180;

          const x1 = CX + Math.cos(tickRad) * tickInnerR;
          const y1 = CY + Math.sin(tickRad) * tickInnerR;
          const x2 = CX + Math.cos(tickRad) * tickOuterR;
          const y2 = CY + Math.sin(tickRad) * tickOuterR;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', x1);
          line.setAttribute('y1', y1);
          line.setAttribute('x2', x2);
          line.setAttribute('y2', y2);

          if (isCurrent) {
            line.setAttribute('stroke', '#fcd34d');
            line.setAttribute('stroke-width', k === 0 ? '3' : '1.9');
            line.setAttribute('opacity', k === 0 ? '1' : '0.85');
          } else {
            line.setAttribute('stroke', '#475569');
            line.setAttribute('stroke-width', k === 0 ? '1.6' : '1.1');
            line.setAttribute('opacity', '0.7');
          }
          ticksG.appendChild(line);
        }
      }

      // 新增：当前时辰内的实时“刻”指示器（小金点）
      // progressWithinShichen: 0~1 表示在当前2小时时辰内走过的比例
      if (progressWithinShichen > 0) {
        const baseAng = (currentIdx * 30 - 90);
        const currentKeAngle = baseAng + (progressWithinShichen * 30);   // 8刻 = 30度
        const rad = currentKeAngle * Math.PI / 180;

        // 外圈小金点（更醒目）
        const dotR = 135;
        const dx = CX + Math.cos(rad) * dotR;
        const dy = CY + Math.sin(rad) * dotR;

        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', dx);
        dot.setAttribute('cy', dy);
        dot.setAttribute('r', '4.5');
        dot.setAttribute('fill', '#fcd34d');
        dot.setAttribute('stroke', '#854d0e');
        dot.setAttribute('stroke-width', '1');
        ticksG.appendChild(dot);

        // 内侧细微连接线（更优雅）
        const innerDotR = 120;
        const ix = CX + Math.cos(rad) * innerDotR;
        const iy = CY + Math.sin(rad) * innerDotR;

        const connector = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        connector.setAttribute('x1', dx);
        connector.setAttribute('y1', dy);
        connector.setAttribute('x2', ix);
        connector.setAttribute('y2', iy);
        connector.setAttribute('stroke', '#fcd34d');
        connector.setAttribute('stroke-width', '1.2');
        connector.setAttribute('opacity', '0.6');
        ticksG.appendChild(connector);
      }
    }

    function startShichenClock() {
      if (dialRAF) cancelAnimationFrame(dialRAF);

      function animate() {
        const now = new Date();
        const idx = getShichenIndex(now.getHours());

        // 计算当前时辰内走过的比例（0~1），用于实时“刻”指示器
        const range = SHICHEN_RANGES[idx];
        let startH = range.start;
        let hourNow = now.getHours();
        let minNow = now.getMinutes();

        let minutesIntoShichen = 0;
        if (idx === 0) { // 子时特殊：23:00 ~ 01:00
          if (hourNow >= 23) {
            minutesIntoShichen = (hourNow - 23) * 60 + minNow;
          } else {
            minutesIntoShichen = (hourNow + 1) * 60 + minNow;
          }
        } else {
          minutesIntoShichen = (hourNow - startH) * 60 + minNow;
        }
        minutesIntoShichen = Math.max(0, Math.min(119, minutesIntoShichen));
        const progress = minutesIntoShichen / 120;

        // 每帧都重绘刻度（带实时指示器）+ 高亮标签
        highlightShichen(idx);
        draw刻度ForShichen(idx, progress);

        // 中心文字只在时辰切换时更新
        if (idx !== lastShichen) {
          const main = document.getElementById('dial-center-main');
          const sub = document.getElementById('dial-center-sub');
          if (main && sub) {
            const branch = ZHI[idx];
            main.textContent = branch + '时';

            // 五行颜色
            const wx = WUXING[branch];
            const color = WUXING_COLOR[wx] || '#fcd34d';
            main.setAttribute('fill', color);

            const r = SHICHEN_RANGES[idx];
            sub.textContent = `${r.start}:00 - ${r.end}:00`.replace('24', '00');
          }
          lastShichen = idx;
        }

        // 最外天体轨道环 + 太阳月亮行星（支持历史查询日期）
        const civilNow = new Date();  // 仅用于主表盘时辰
        let astroNow = new Date();
        const histInput = document.getElementById('history-datetime');
        if (histInput && histInput.value) {
          const parsed = new Date(histInput.value);
          if (!isNaN(parsed.getTime())) astroNow = parsed;
        }

        const astroDateStr = astroNow.toDateString();
        if (astroDateStr !== lastSolarDateStr) {
          lastSolarDateStr = astroDateStr;
          drawSolarRingForBeijing(astroNow);
          // 重新绘制28星宿
          const moonAng = getMoonAngleOnDial(astroNow);
          drawLunarMansionsRing(moonAng);
        }

        // 实时更新太阳 + 月球 + 行星位置（使用 astro 时间）
        updateSunAndMoonPositions(astroNow);

        dialRAF = requestAnimationFrame(animate);
      }
      animate();
    }

    // ==================== 纯轨道环（只保留天体轨道，不画表盘界环） ====================
    function drawSolarRingForBeijing(date) {
      const g = document.getElementById('solar-ring');
      if (!g) return;
      g.innerHTML = '';

      // 只绘制行星轨道环（紧凑、无多余装饰界环）
      const ringOrder = ['saturn', 'jupiter', 'mars', 'venus', 'mercury', 'solar'];
      const ringColors = {
        solar: '#854d0e',
        mercury: '#64748b',
        venus: '#facc15',
        mars: '#f87171',
        jupiter: '#4ade80',   // 木星 - 绿色
        saturn: '#854d0e'     // 土星 - 褐色
      };

      ringOrder.forEach(key => {
        const r = RINGS[key];
        const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ring.setAttribute('cx', CX);
        ring.setAttribute('cy', CY);
        ring.setAttribute('r', r);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', ringColors[key]);
        ring.setAttribute('stroke-width', key === 'solar' ? '1.8' : '1.1');
        ring.setAttribute('opacity', '0.55');
        g.appendChild(ring);
      });

      // 太阳环的白天高亮 + 日出日落（保留必要信息）
      const sunTimes = getChangAnSunriseSunset(date);
      if (sunTimes.sunrise && sunTimes.sunset) {
        const outerR = RINGS.solar;
        const circumference = 2 * Math.PI * outerR;
        const dayHours = (sunTimes.sunset - sunTimes.sunrise) / 3600000;
        const dayFraction = Math.max(0.05, Math.min(0.95, dayHours / 24));

        function timeToAngle(d) {
          const h = d.getHours() + d.getMinutes() / 60;
          return (h * 15 - 90 + 360) % 360;
        }

        const riseAng = timeToAngle(sunTimes.sunrise);
        const setAng  = timeToAngle(sunTimes.sunset);
        const dashArray = circumference * dayFraction;
        const dashOffset = -(riseAng / 360) * circumference;

        const dayHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dayHighlight.setAttribute('cx', CX);
        dayHighlight.setAttribute('cy', CY);
        dayHighlight.setAttribute('r', outerR);
        dayHighlight.setAttribute('fill', 'none');
        dayHighlight.setAttribute('stroke', '#fcd34d');
        dayHighlight.setAttribute('stroke-width', '6');
        dayHighlight.setAttribute('opacity', '0.25');
        dayHighlight.setAttribute('stroke-linecap', 'round');
        dayHighlight.setAttribute('stroke-dasharray', `${dashArray} ${circumference - dashArray}`);
        dayHighlight.setAttribute('stroke-dashoffset', dashOffset);
        g.appendChild(dayHighlight);

        // 恢复日出日落精确时间显示（放在太阳轨道外侧）
        const riseRad = riseAng * Math.PI / 180;
        const setRad  = setAng * Math.PI / 180;

        // 日出小标记
        const riseX = CX + Math.cos(riseRad) * outerR;
        const riseY = CY + Math.sin(riseRad) * outerR;
        const riseMarker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        riseMarker.setAttribute('cx', riseX);
        riseMarker.setAttribute('cy', riseY);
        riseMarker.setAttribute('r', '3.2');
        riseMarker.setAttribute('fill', '#fcd34d');
        riseMarker.setAttribute('stroke', '#854d0e');
        riseMarker.setAttribute('stroke-width', '1');
        g.appendChild(riseMarker);

        // 日落小标记
        const setX = CX + Math.cos(setRad) * outerR;
        const setY = CY + Math.sin(setRad) * outerR;
        const setMarker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        setMarker.setAttribute('cx', setX);
        setMarker.setAttribute('cy', setY);
        setMarker.setAttribute('r', '3.2');
        setMarker.setAttribute('fill', '#f59e0b');
        setMarker.setAttribute('stroke', '#854d0e');
        setMarker.setAttribute('stroke-width', '1');
        g.appendChild(setMarker);

        // 时间文字（外侧）
        const fmt = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

        const riseTextX = CX + Math.cos(riseRad) * (outerR + 18);
        const riseTextY = CY + Math.sin(riseRad) * (outerR + 18);
        const riseText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        riseText.setAttribute('x', riseTextX);
        riseText.setAttribute('y', riseTextY);
        riseText.setAttribute('text-anchor', 'middle');
        riseText.setAttribute('dominant-baseline', 'middle');
        riseText.setAttribute('font-size', '9');
        riseText.setAttribute('fill', '#fcd34d');
        riseText.setAttribute('font-weight', '700');
        riseText.textContent = '日出 ' + fmt(sunTimes.sunrise);
        g.appendChild(riseText);

        const setTextX = CX + Math.cos(setRad) * (outerR + 18);
        const setTextY = CY + Math.sin(setRad) * (outerR + 18);
        const setText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        setText.setAttribute('x', setTextX);
        setText.setAttribute('y', setTextY);
        setText.setAttribute('text-anchor', 'middle');
        setText.setAttribute('dominant-baseline', 'middle');
        setText.setAttribute('font-size', '9');
        setText.setAttribute('fill', '#f59e0b');
        setText.setAttribute('font-weight', '700');
        setText.textContent = '日落 ' + fmt(sunTimes.sunset);
        g.appendChild(setText);
      }
    }

    // ==================== 28星宿环（最外圈，四象颜色区分，实时月宿高亮） ====================
    function drawLunarMansionsRing(moonAngle) {
      const g = document.getElementById('solar-ring');
      if (!g) return;

      // 清除旧的星宿内容
      let mansionsGroup = document.getElementById('mansions-group');
      if (mansionsGroup) {
        mansionsGroup.innerHTML = '';
      } else {
        mansionsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        mansionsGroup.id = 'mansions-group';
        g.appendChild(mansionsGroup);
      }

      const mansionsR = 272;

      const allMansions = [];
      ['east', 'north', 'west', 'south'].forEach(dir => {
        MANSIONS[dir].mansions.forEach(m => {
          allMansions.push({ name: m, color: MANSIONS[dir].color });
        });
      });

      const total = allMansions.length;
      const angleStep = 360 / total;

      let currentIndex = Math.floor(((moonAngle + 360) % 360) / angleStep);
      currentIndex = (currentIndex + total) % total;

      allMansions.forEach((m, i) => {
        const ang = (i * angleStep - 90 + 360) % 360;
        const rad = ang * Math.PI / 180;

        const x = CX + Math.cos(rad) * mansionsR;
        const y = CY + Math.sin(rad) * mansionsR;

        const isCurrent = (i === currentIndex);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('font-family', '"Noto Serif SC", "Noto Sans SC", serif');
        text.setAttribute('font-size', isCurrent ? '13' : '11');
        text.setAttribute('font-weight', isCurrent ? '700' : '600');
        text.setAttribute('fill', m.color);
        text.textContent = m.name;

        mansionsGroup.appendChild(text);
      });

      // 应用整体旋转（用于随节气变动位置）
      if (mansionsBaseRotation !== 0) {
        mansionsGroup.setAttribute('transform', `rotate(${mansionsBaseRotation} ${CX} ${CY})`);
      }
    }

    // ==================== 实时太阳 + 月球（纹理） + 五大行星（带名字 + 纹理） ====================
    function updateSunAndMoonPositions(now) {
      const g = document.getElementById('solar-ring');
      if (!g) return;

      // 太阳位置（使用民用时间）
      const sunH = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
      const sunAng = sunH * 15 - 90;
      const sunRad = sunAng * Math.PI / 180;
      const sunX = CX + Math.cos(sunRad) * RINGS.solar;
      const sunY = CY + Math.sin(sunRad) * RINGS.solar;

      const sunTimes = getChangAnSunriseSunset(now);
      const isDay = sunTimes.sunrise && sunTimes.sunset && now >= sunTimes.sunrise && now <= sunTimes.sunset;

      let sunGlow = document.getElementById('solar-sun-glow');
      let sunCore = document.getElementById('solar-sun-core');
      if (!sunGlow) { sunGlow = document.createElementNS('http://www.w3.org/2000/svg','circle'); sunGlow.id = 'solar-sun-glow'; sunGlow.setAttribute('r','10'); g.appendChild(sunGlow); }
      if (!sunCore) { sunCore = document.createElementNS('http://www.w3.org/2000/svg','circle'); sunCore.id = 'solar-sun-core'; sunCore.setAttribute('r','6.5'); sunCore.setAttribute('stroke','#92400e'); sunCore.setAttribute('stroke-width','1.8'); g.appendChild(sunCore); }

      sunGlow.setAttribute('fill', isDay ? '#fcd34d' : '#fb923c');
      sunGlow.setAttribute('opacity', isDay ? '0.26' : '0.17');
      sunCore.setAttribute('fill', isDay ? '#fcd34d' : '#fb923c');
      sunGlow.setAttribute('cx', sunX); sunGlow.setAttribute('cy', sunY);
      sunCore.setAttribute('cx', sunX); sunCore.setAttribute('cy', sunY);

      // 月球（带纹理 + 名字“月”）
      const moonAng = getMoonAngleOnDial(now);
      const moonRad = moonAng * Math.PI / 180;
      const moonX = CX + Math.cos(moonRad) * RINGS.solar;
      const moonY = CY + Math.sin(moonRad) * RINGS.solar;

      let moonGroup = document.getElementById('solar-moon-group');
      if (!moonGroup) {
        moonGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        moonGroup.id = 'solar-moon-group';
        g.appendChild(moonGroup);
      }
      moonGroup.innerHTML = '';

      const mBase = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      mBase.setAttribute('cx', moonX); mBase.setAttribute('cy', moonY);
      mBase.setAttribute('r', '6.8'); mBase.setAttribute('fill', '#e2e8f0');
      moonGroup.appendChild(mBase);

      // 月面纹理（环形山）
      [[-1.8,-1.6,1.6],[1.5,-1.2,1.3],[-0.8,2.2,1.9],[2.1,1.8,1.0]].forEach(([dx,dy,r]) => {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', moonX + dx); c.setAttribute('cy', moonY + dy);
        c.setAttribute('r', r); c.setAttribute('fill', '#64748b'); c.setAttribute('opacity', '0.5');
        moonGroup.appendChild(c);
      });

      // 月球名字
      const moonName = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      moonName.setAttribute('x', moonX + 11);
      moonName.setAttribute('y', moonY + 3);
      moonName.setAttribute('font-size', '11');
      moonName.setAttribute('fill', '#bae6fd');
      moonName.setAttribute('font-weight', '700');
      moonName.textContent = '月';
      moonGroup.appendChild(moonName);

      // 五大行星（纹理 + 单字名字）
      const planets = [
        { key: 'mercury', char: '水', color: '#94a3b8', size: 3.8 },
        { key: 'venus',   char: '金', color: '#fef08c', size: 5.8 },
        { key: 'mars',    char: '火', color: '#f87171', size: 4.5 },
        { key: 'jupiter', char: '木', color: '#4ade80', size: 7.2 },   // 绿色
        { key: 'saturn',  char: '土', color: '#854d0e', size: 6.2 }    // 褐色
      ];

      planets.forEach(p => {
        const ang = getPlanetAngle(p.key, now);
        const rad = ang * Math.PI / 180;
        const x = CX + Math.cos(rad) * RINGS[p.key];
        const y = CY + Math.sin(rad) * RINGS[p.key];

        const pid = 'planet-' + p.key;
        const old = document.getElementById(pid);
        if (old) old.remove();

        const pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        pg.id = pid;

        // 基础光晕
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        glow.setAttribute('cx', x); glow.setAttribute('cy', y);
        glow.setAttribute('r', p.size * 1.6);
        glow.setAttribute('fill', p.color);
        glow.setAttribute('opacity', '0.2');
        pg.appendChild(glow);

        if (p.key === 'saturn') {
          // 土星 + 环
          const ring = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
          ring.setAttribute('cx', x); ring.setAttribute('cy', y);
          ring.setAttribute('rx', p.size * 1.55); ring.setAttribute('ry', 1.8);
          ring.setAttribute('fill', 'none'); ring.setAttribute('stroke', '#fde047'); ring.setAttribute('stroke-width', '1.4');
          pg.appendChild(ring);

          const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          core.setAttribute('cx', x); core.setAttribute('cy', y);
          core.setAttribute('r', p.size); core.setAttribute('fill', p.color);
          pg.appendChild(core);
        } 
        else if (p.key === 'jupiter') {
          // 木星 + 云带
          const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          core.setAttribute('cx', x); core.setAttribute('cy', y);
          core.setAttribute('r', p.size); core.setAttribute('fill', p.color);
          pg.appendChild(core);

          const band = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
          band.setAttribute('cx', x); band.setAttribute('cy', y);
          band.setAttribute('rx', p.size * 0.92); band.setAttribute('ry', 1.6);
          band.setAttribute('fill', '#c2410f'); band.setAttribute('opacity', '0.35');
          pg.appendChild(band);
        } 
        else {
          const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          core.setAttribute('cx', x); core.setAttribute('cy', y);
          core.setAttribute('r', p.size); core.setAttribute('fill', p.color);
          pg.appendChild(core);
        }

        // 行星名字（单字）
        const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        name.setAttribute('x', x + p.size + 6);
        name.setAttribute('y', y + 3);
        name.setAttribute('font-size', '10.5');
        name.setAttribute('fill', p.color);
        name.setAttribute('font-weight', '700');
        name.textContent = p.char;
        pg.appendChild(name);

        g.appendChild(pg);
      });

      // 更新28星宿环（实时高亮当前月宿）
      const moonAngForMansions = getMoonAngleOnDial(now);
      drawLunarMansionsRing(moonAngForMansions);
    }

    // 旧的 updateDial 已彻底移除。
    // 当前驱动：startShichenClock + RAF（仅刻度高亮 + 中心文字更新）
    function updateDial(now) {
      // 已废弃（空实现）
    }

    // ==================== 启动
    window.onload = function() {
      loadTheme();
      init();
      // 旧的 updateBirthdayButton 已移除
    };
  </script>
